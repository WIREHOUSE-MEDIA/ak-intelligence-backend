<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Artist Intelligence — Wirehouse Media</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c8a96e;--gl:#e8d4a8;--gd:#c8a96e22;--teal:#69C9D0;--pink:#E1306C;--grn:#1DB954;--red:#FF0000;--blue:#1877F2;--bg:#05050d;--bg2:#09091a;--bg3:#0d0d22;--card:#0f0f1f;--bdr:#1c1c35;--tx:#ede9e0;--tx2:#8888aa;--tx3:#44445a;--dim:#2a2a48}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;background:rgba(5,5,13,.97);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;z-index:50}
.logo-l{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-ak{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:.25em;color:var(--gold)}
.logo-nm{font-family:'Playfair Display',serif;font-size:15px;color:var(--tx);font-style:italic}
.logo-nm span{color:var(--gold);font-style:normal}
.htabs{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
.htabs::-webkit-scrollbar{display:none}
.htab{padding:4px 10px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:1px solid transparent;background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .14s}
.htab.on{background:var(--gd);color:var(--gold);border-color:#c8a96e2a}
.hdr-r{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--tx3);flex-shrink:0;text-transform:uppercase}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:166px;border-right:1px solid var(--bdr);background:var(--bg2);overflow-y:auto;flex-shrink:0;scrollbar-width:none}
.sidebar::-webkit-scrollbar{display:none}
.sg{padding:14px 13px 3px;font-size:8px;color:var(--tx3);letter-spacing:.2em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif}
.si{padding:8px 13px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif;color:var(--tx3);border-left:2px solid transparent;cursor:pointer;transition:all .11s;display:flex;align-items:center;gap:8px}
.si.on{color:var(--gold);border-left-color:var(--gold);background:#c8a96e07}
.si:hover:not(.on){color:var(--tx);background:#ffffff04}
.si .ico{opacity:.38;font-size:11px;width:14px;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--dim) var(--bg)}
.pt{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;margin-bottom:1px}
.ps{font-size:9px;color:var(--tx2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;font-weight:600;font-family:'Syne',sans-serif}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:15px;margin-bottom:11px}
.cl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:7px;font-weight:700;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:11px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:13px}
.kl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;font-weight:700;font-family:'Syne',sans-serif}
.kv{font-family:'Playfair Display',serif;font-size:23px;line-height:1;margin-bottom:2px}
.ks{font-size:9px;color:#a8f0c8;margin-top:2px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);padding-bottom:7px;border-bottom:1px solid var(--bdr);padding-right:10px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
td{padding:8px 10px 8px 0;border-bottom:1px solid #080818;font-size:11px;vertical-align:middle}
.trow:hover{background:#c8a96e04;cursor:pointer}
a{color:var(--teal);text-decoration:none}a:hover{opacity:.7;text-decoration:underline}
.dl{font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border-radius:3px;padding:2px 6px;display:inline-block;text-decoration:none;margin-right:2px;border:1px solid currentColor;opacity:.8}
.dl:hover{opacity:1;text-decoration:none}
.btn{padding:7px 14px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:none;background:var(--gold);color:var(--bg);cursor:pointer;transition:all .14s}
.btn:hover{background:var(--gl)}
.bsm{padding:5px 10px;font-size:9px}
.btno{padding:5px 11px;border-radius:7px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.btno:hover{border-color:var(--gd);color:var(--gold)}
.chip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.chip.on{border-color:#c8a96e55;background:var(--gd);color:var(--gold)}
.inp{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--tx);outline:none;font-family:'DM Mono',monospace;width:100%;transition:border .14s}
.inp:focus{border-color:#c8a96e33}
.bge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:'Syne',sans-serif;display:inline-block}
.bge-live{background:#1DB95418;color:#1DB954;border:1px solid #1DB95433}
.bge-wait{background:#f0e68c14;color:#f0e68c;border:1px solid #f0e68c28}
.bge-cx{background:#69C9D014;color:#69C9D0;border:1px solid #69C9D028}
.an{background:#c8a96e07;border:1px solid #c8a96e18;border-radius:7px;padding:7px 11px;font-size:9px;color:#c8a96e88;margin-bottom:11px;line-height:1.9}
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
.br{margin-bottom:7px}
.brl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.brl span:first-child{color:#aaa}
.brt{height:3px;background:#10102a;border-radius:2px}
.brf{height:100%;border-radius:2px}
.loading{color:var(--tx2);font-size:11px;padding:18px;text-align:center;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
.err{color:#f09a9a;font-size:11px;padding:11px 13px;background:#f09a9a08;border:1px solid #f09a9a1a;border-radius:8px;line-height:1.9}
.ok{color:#a8f0c8;font-size:11px;padding:7px 11px;background:#a8f0c808;border:1px solid #a8f0c81a;border-radius:7px;margin-bottom:9px}
.sp-img{width:33px;height:33px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.sp-bar{width:52px;height:3px;background:#111128;border-radius:2px;flex-shrink:0}
.sp-fill{height:100%;border-radius:2px}
/* AI CHAT */
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 168px);min-height:340px}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:10px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
.ai-u{align-self:flex-end;max-width:78%;padding:9px 13px;border-radius:10px 10px 2px 10px;background:var(--gd);border:1px solid #c8a96e22;font-size:11px;line-height:1.7;color:var(--gold);white-space:pre-wrap}
.ai-a{align-self:flex-start;max-width:84%;padding:9px 13px;border-radius:10px 10px 10px 2px;background:var(--bg3);border:1px solid var(--bdr);font-size:11px;line-height:1.7;color:#ccc;white-space:pre-wrap}
.ai-a a{color:var(--teal)}
.typing{display:flex;gap:4px;padding:8px 13px;align-self:flex-start;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:db 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cday{min-height:48px;border-radius:6px;padding:4px 5px;border:1px solid #0e0e1e;transition:transform .1s}
.cday.hev{cursor:pointer}.cday.hev:hover{transform:scale(1.05);z-index:2}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:#08081a;border:1px solid var(--bdr);border-radius:12px;padding:22px;max-width:560px;width:92%;max-height:88vh;overflow-y:auto}
/* EDITABLE */
.ec{padding:4px 6px;border-radius:4px;border:1px solid transparent;background:transparent;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx);width:100%;transition:all .13s}
.ec:focus{border-color:var(--gd);background:var(--bg);outline:none}
select.ec option{background:var(--bg2)}
/* CAMPAIGN SECTION */
.camp-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);margin-bottom:8px;cursor:pointer}
.camp-hdr:hover{opacity:.8}
.pg{animation:pgIn .2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.codeblock{background:#05050f;border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:9px;color:#a8f0c8;line-height:1.9;overflow-x:auto;white-space:pre}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo-l"><span class="logo-ak">AK</span><span class="logo-nm">Artist <span>Intelligence</span></span></div>
    <div class="htabs" id="htabs"></div>
    <div class="hdr-r">Wirehouse Media</div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="mroot"></div>
<script>
// ═══════════ CONFIG ═══════════
const API = "https://ak-intelligence-backend.onrender.com";
const AK_SP_ID = "3DiDSECUqqY1AuBP8qtaIa";

async function apicall(path, opts={}) {
  const r = await fetch(API+path, {headers:{"Content-Type":"application/json",...(opts.headers||{})},...opts});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.substring(0,200)}`);}
  return r.json();
}

// ═══════════ SPOTIFY ═══════════
const SP = {
  artist: ()=>apicall(`/spotify/artist?id=${AK_SP_ID}`),
  tracks: ()=>apicall(`/spotify/top-tracks?id=${AK_SP_ID}&market=US`),
};

// ═══════════ CHARTEX ═══════════
// Backend now auto-appends "alicia keys" and normalizes response to {items:[...]}
const CX = { search: q=>apicall(`/chartex/sounds?search=${encodeURIComponent(q)}&limit=20`) };

// ═══════════ AIRTABLE ═══════════
const AT = {
  list: (t,f)=>apicall(`/airtable/${encodeURIComponent(t)}${f?`?filterByFormula=${encodeURIComponent(f)}`:""}`)
    .then(d=>d.records||[]),
  create: (t,fields)=>apicall(`/airtable/${encodeURIComponent(t)}`,{method:"POST",body:JSON.stringify(fields)}),
  update: (t,id,fields)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"PATCH",body:JSON.stringify(fields)}),
  del: (t,id)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"DELETE"}),
};

// ═══════════ AI CHAT ═══════════
const aiHist=[];
async function aiChat(msg){
  aiHist.push({role:"user",content:msg});
  const d=await apicall("/ai/chat",{method:"POST",body:JSON.stringify({messages:aiHist})});
  aiHist.push({role:"assistant",content:d.reply});
  return d.reply;
}

// ═══════════ HELPERS ═══════════
const enc=encodeURIComponent;
const G="#c8a96e",Tl="#69C9D0",Rd="#E1306C",Gr="#1DB954",YT="#FF0000";
const ST={contracted:"#a8f0c8",approved:"#a8f0c8",active:"#a8f0c8","draft review":"#c8a96e",
  negotiating:"#f0e68c","outreach sent":"#69C9D0",draft:"#888",evaluating:"#f0e68c",pending:"#f0e68c"};
const TC={owned:"#c8a96e",influencer:"#69C9D0",dsp:"#1DB954",pr:"#E1306C",paid:"#9b59b6",report:"#888"};
const PC={News:"#c8a96e",TikTok:"#69C9D0",Reddit:"#FF4500",Blogs:"#a8f0c8",LinkedIn:"#1877F2",YouTube:"#FF0000",Instagram:"#E1306C",Quora:"#A82400"};
const fmt=n=>{if(!n&&n!==0)return"–";n=parseInt(n);return n>=1e9?(n/1e9).toFixed(1)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?Math.round(n/1e3)+"K":String(n)};
const pill=(c,t)=>`<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}30">${t}</span>`;
const bar=(l,v,p,c)=>`<div class="br"><div class="brl"><span>${l}</span><span style="color:${c};font-family:'Playfair Display',serif">${v}</span></div><div class="brt"><div class="brf" style="width:${Math.min(p,100)}%;background:${c}"></div></div></div>`;
const kpi=(l,v,s,c,b)=>`<div class="kpi"><div class="kl">${l}${b?` <span class="bge bge-${b}">${b==="live"?"✅ LIVE":b==="wait"?"🔒 API":"⚡"}</span>`:""}</div><div class="kv" style="color:${c||"var(--tx)"}">${v}</div>${s?`<div class="ks">↑ ${s}</div>`:""}</div>`;
const dspLinks=s=>[["SP","#1DB954",`https://open.spotify.com/search/${enc(s+" Alicia Keys")}`],["Apple","#FC3C44",`https://music.apple.com/search?term=${enc(s+" Alicia Keys")}`],["YT","#FF0000",`https://music.youtube.com/search?q=${enc(s+" Alicia Keys")}`],["Amazon","#00A8E0",`https://music.amazon.com/search/${enc(s+" Alicia Keys")}`]].map(([n,c,u])=>`<a href="${u}" target="_blank" class="dl" style="color:${c}">${n}</a>`).join("");

// ═══════════ CALENDAR EVENTS ═══════════
const CAL={
  4:{l:"IG Story Drop",t:"owned",cap:"New music is in the air 💜 Something special coming very soon… 🎹✨ #AliciaKeys",st:"pending"},
  7:{l:"TikTok Creator Wave",t:"influencer",cap:"Use the sound and show us your version! 🔥 #AliciaKeys #TrySleeping",st:"approved"},
  12:{l:"Con Cora Gala Recap",t:"owned",cap:"The performance everyone is talking about 💜 Alicia Keys + Karol G at Con Cora Gala — pure magic. #AliciaKeys #KarolG #ConCoraGala",st:"pending"},
  18:{l:"Creator Draft Due",t:"influencer",cap:"All creators submit drafts for review today. Jade Elia & DeeJ Music — TikTok sound: Try Sleeping with a Broken Heart.",st:""},
  21:{l:"X Campaign",t:"paid",cap:"",st:""},
  24:{l:"FB Live Promo",t:"owned",cap:"Going LIVE this Sunday 💜 Intimate conversation about music, healing, and what's next 🎹 #AliciaKeys",st:"draft"},
  28:{l:"Monthly Report",t:"report",cap:"",st:""},
};
const calComments={};

// ═══════════ FEED DATA ═══════════
const FEED=[
  {src:"Billboard",plat:"News",txt:"Alicia Keys & Karol G's Con Cora Gala Performance — The Cultural Reset of 2026",time:"2h",sent:"positive",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.billboard.com/music/pop/alicia-keys/"},
  {src:"@musicmomentsreal",plat:"TikTok",txt:"Alicia Keys and Karol G at Con Cora Gala 😭🎹 EVERYTHING #AliciaKeys #KarolG #ConCoraGala",time:"4h",sent:"positive",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.tiktok.com/search?q=alicia+keys+karol+g+con+cora+gala"},
  {src:"Rolling Stone",plat:"News",txt:"Alicia Keys & Karol G — Full Con Cora Gala Breakdown",time:"6h",sent:"positive",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.rollingstone.com/music/music-news/alicia-keys/"},
  {src:"@vibeswithjada",plat:"TikTok",txt:"The Con Cora Gala set with AK + Karol G has me SOBBING 😭💜 #AliciaKeys #KarolG",time:"8h",sent:"positive",tags:["#AliciaKeys","#KarolG","#Plentiful"],url:"https://www.tiktok.com/search?q=alicia+keys+karol+g"},
  {src:"r/rnb",plat:"Reddit",txt:"AK + Karol G at Con Cora Gala — why this is the cross-genre moment of 2026",time:"10h",sent:"neutral",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.reddit.com/r/rnb/search/?q=alicia+keys+karol+g"},
  {src:"Variety",plat:"News",txt:"Hell's Kitchen Broadway: Alicia Keys Musical Sell-Out Run Spring 2026",time:"1d",sent:"positive",tags:["#AliciaKeys","#HellsKitchenBroadway"],url:"https://variety.com/t/alicia-keys/"},
  {src:"@rnbqueen2025",plat:"TikTok",txt:"Plentiful feat Pusha T is the collab nobody expected but EVERYONE needed 🔥 #Plentiful #AliciaKeys",time:"1d",sent:"positive",tags:["#Plentiful","#AliciaKeys","#PushaT"],url:"https://www.tiktok.com/search?q=alicia+keys+plentiful+pusha+t"},
  {src:"Pitchfork",plat:"Blogs",txt:"Plentiful ft. Pusha T proves Alicia Keys' catalog is timeless and still evolving",time:"2d",sent:"positive",tags:["#Plentiful","#AliciaKeys"],url:"https://pitchfork.com/search/#stq=alicia+keys"},
  {src:"LinkedIn",plat:"LinkedIn",txt:"Con Cora Gala: how Alicia Keys + Karol G redefined cross-genre brand strategy",time:"2d",sent:"positive",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.linkedin.com/search/results/content/?keywords=alicia+keys+karol+g"},
  {src:"YouTube",plat:"YouTube",txt:"REACTING TO: Alicia Keys + Karol G Con Cora Gala — full performance breakdown",time:"3d",sent:"positive",tags:["#AliciaKeys","#KarolG","#ConCoraGala"],url:"https://www.youtube.com/results?search_query=alicia+keys+karol+g+con+cora+gala"},
];

// ═══════════ NAV ═══════════
const NAV=[
  {g:"Analytics",items:[{id:"overview",l:"Overview",i:"◈"},{id:"platforms",l:"Platforms",i:"⊕"},{id:"dsp",l:"DSP & Streaming",i:"♫"},{id:"catalogue",l:"Full Catalogue",i:"♪"},{id:"chartex",l:"ChartEx Live",i:"⚡"},{id:"analysis",l:"Content Analysis",i:"◎"},{id:"listening",l:"Social Listening",i:"◎"}]},
  {g:"Intelligence",items:[{id:"ai",l:"Hey Jessi ✦",i:"✦"}]},
  {g:"Campaigns",items:[{id:"campaigns",l:"Campaign Manager",i:"◉"},{id:"crm",l:"Creator CRM",i:"◈"},{id:"budget",l:"Budget Tracker",i:"▣"},{id:"calendar",l:"Calendar & Canva",i:"□"},{id:"drafts",l:"Content Drafts",i:"◇"}]},
  {g:"Operations",items:[{id:"partners",l:"Partners & APIs",i:"⊕"}]},
];
let CUR="overview";
function buildNav(){
  const all=NAV.flatMap(g=>g.items);
  document.getElementById("htabs").innerHTML=all.map(({id,l})=>`<button class="htab ${id===CUR?"on":""}" onclick="go('${id}')">${l}</button>`).join("");
  document.getElementById("sidebar").innerHTML=NAV.map(({g,items})=>`<div class="sg">${g}</div>${items.map(({id,l,i})=>`<div class="si ${id===CUR?"on":""}" onclick="go('${id}')"><span class="ico">${i}</span>${l}</div>`).join("")}`).join("");
}
window.go=id=>{CUR=id;buildNav();renderPage()};
function renderPage(){
  const p=NAV.flatMap(g=>g.items).find(x=>x.id===CUR)||NAV[0].items[0];
  document.getElementById("main").innerHTML=`<div class="pt">${p.l}</div><div class="ps">Alicia Keys · April 2026</div><div class="pg">${getPage(CUR)}</div>`;
  afterRender(CUR);
}

// ═══════════ OVERVIEW ═══════════
function pgOverview(){return`
<div class="an">✅ Spotify loading LIVE from Render backend · Mention estimates = sample (Brand24 MCP after Apr 15)</div>
<div class="g4">
  ${kpi("Spotify Monthly Listeners","<span id='ov-ml'>Loading…</span>","+8.3% (30d)","#1DB954","live")}
  ${kpi("Instagram Followers","28M","0.61% engagement","#E1306C","live")}
  ${kpi("TikTok Followers","8M","50.5M total likes","#69C9D0","live")}
  ${kpi("Est. Total Mentions","~2.4M","Brand24 after Apr 15","#c8a96e","wait")}
</div>
<div class="g2">

function getSongLevel(query){
  const q=query.toLowerCase().trim();
  // Check exact match first, then partial
  if(CX_SONG_MAP[q])return CX_SONG_MAP[q];
  const key=Object.keys(CX_SONG_MAP).find(k=>q.includes(k)||k.includes(q));
  return key?CX_SONG_MAP[key]:{cx:null,sp:null};
}

  const spent=budgetData.lines.reduce((a,b)=>a+b.spent,0);
  const committed=budgetData.lines.reduce((a,b)=>a+(b.st!=="paid"&&b.st!=="active"?b.total:0),0);
  const remaining=budgetData.total-spent-committed;
  return{spent,committed,remaining};
}

window.saveBudgetLine=async id=>{
  const l=budgetData.lines.find(x=>x.id===id);if(!l)return;
  l.name=document.getElementById(`bn-${id}`)?.value||l.name;
  l.platform=document.getElementById(`bpl-${id}`)?.value||l.platform;
  l.total=parseFloat(document.getElementById(`bt-${id}`)?.value)||l.total;
  l.spent=parseFloat(document.getElementById(`bs-${id}`)?.value)||l.spent;
  l.st=document.getElementById(`bst-${id}`)?.value||l.st;
  l.agent=document.getElementById(`bag-${id}`)?.value||"";
  l.agentEmail=document.getElementById(`bae-${id}`)?.value||"";
  l.turnAround=document.getElementById(`bta-${id}`)?.value||l.turnAround;
  l.notes=document.getElementById(`bno-${id}`)?.value||"";
  const btn=document.querySelector(`#br-${id} .btn`);
  if(btn){btn.textContent="Saving…";btn.disabled=true;}
  try{
    if(!id.startsWith("local"))await AT.update("Budget",id,{Name:l.name,Campaign:l.camp,Platform:l.platform,Budget:l.total,Spent:l.spent,Status:l.st,Agent:l.agent,AgentEmail:l.agentEmail,Notes:l.notes});
    if(btn){btn.textContent="✓ Saved";btn.style.background="#a8f0c8";btn.style.color="#000";}
    setTimeout(()=>{if(btn){btn.textContent="Save";btn.style.background="";btn.style.color="";btn.disabled=false;}},2000);
    refreshBudgetSummary();
  }catch(e){if(btn){btn.textContent="Retry";btn.disabled=false;}}
};

window.addBudgetLine=(camp)=>{

  budgetData.lines.push(newLine);renderPage();
  setTimeout(()=>{document.getElementById(`bn-${id}`)?.focus();},100);
};

window.refreshBudgetSummary=()=>{
  // Update all line items' totals and spent from inputs
  budgetData.lines.forEach(l=>{
    const t=document.getElementById(`bt-${l.id}`);
    const s=document.getElementById(`bs-${l.id}`);
    if(t)l.total=parseFloat(t.value)||0;
    if(s)l.spent=parseFloat(s.value)||0;
  });
};

window.exportBudget=()=>{
  const csv=[["Name","Campaign","Category","Platform","Budget","Spent","Remaining","Status","Agent","Agent Email","Turnaround","Notes"],...budgetData.lines.map(l=>[l.name,l.camp,l.cat,l.platform,l.total,l.spent,l.total-l.spent,l.st,l.agent,l.agentEmail,l.turnAround,l.notes])].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");

};

  r.h=document.getElementById(`crm-h-${id}`)?.value||r.h;
  r.plat=document.getElementById(`crm-p-${id}`)?.value||r.plat;
  r.fol=document.getElementById(`crm-f-${id}`)?.value||r.fol;
  r.eng=document.getElementById(`crm-e-${id}`)?.value||r.eng;
  r.fee=document.getElementById(`crm-fee-${id}`)?.value||r.fee;
  r.camp=document.getElementById(`crm-c-${id}`)?.value||r.camp;
  r.st=document.getElementById(`crm-s-${id}`)?.value||r.st;
  r.notes=document.getElementById(`crm-no-${id}`)?.value||r.notes;
  const btn=document.querySelector(`#crm-${id} .btn`);
  if(btn){btn.textContent="Saving…";btn.disabled=true;}
  try{
    if(!id.startsWith("local"))await AT.update("Creators",id,{Name:r.n,Handle:r.h,Platform:r.plat,Followers:r.fol,Fee:r.fee,Status:r.st,Campaign:r.camp,Notes:r.notes});
    if(btn){btn.textContent="✓ Saved";btn.style.background="#a8f0c8";btn.style.color="#000";}
    setTimeout(()=>{if(btn){btn.textContent="Save";btn.style.background="";btn.style.color="";btn.disabled=false;}},2000);
  }catch(e){if(btn){btn.textContent="Retry";btn.disabled=false;}}
};

            </div>`).join("")||"<div style='font-size:10px;color:var(--tx3);padding:3px 0'>No files added yet</div>"}
          </div>
          <div style="display:flex;gap:6px;margin-top:8px">
            <input class="inp" id="fn-${id}" placeholder="File name or description" style="flex:1">
            <input class="inp" id="fno-${id}" placeholder="Note (optional)" style="width:120px">
            <button class="btn bsm" onclick="addFile2(${id})">+ Add</button>
          </div>
        </div>

        <div class="card" style="margin-bottom:9px">
          <div class="cl" style="margin-bottom:6px">Design in Canva & Resize</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <a href="${d.canva}" target="_blank" class="btn bsm" style="text-decoration:none">🎨 Open Design</a>
            <a href="https://www.canva.com/design/new?type=instagramPost" target="_blank" class="dl" style="color:#E1306C;padding:5px 9px">IG Post</a>
            <a href="https://www.canva.com/design/new?type=instagramStory" target="_blank" class="dl" style="color:#E1306C;padding:5px 9px">IG Story</a>
            <a href="https://www.canva.com/design/new?type=video" target="_blank" class="dl" style="color:#69C9D0;padding:5px 9px">TikTok</a>
            <a href="https://www.canva.com/design/new?type=facebookPost" target="_blank" class="dl" style="color:#1877F2;padding:5px 9px">Facebook</a>
            <a href="https://www.canva.com/design/new?type=twitter_post" target="_blank" class="dl" style="color:#aaa;padding:5px 9px">X/Twitter</a>
            <a href="https://www.canva.com/design/new?type=youtube_thumbnail" target="_blank" class="dl" style="color:#FF0000;padding:5px 9px">YT Thumb</a>
            <a href="https://www.canva.com/brand-hub/content-planner/" target="_blank" class="dl" style="color:#c8a96e;padding:5px 9px">📅 Planner</a>
          </div>
        </div>

        <div class="card" style="margin-bottom:9px">
          <div class="cl" style="margin-bottom:5px">Edit History <span style="font-size:9px;color:var(--tx3);font-weight:400;text-transform:none;letter-spacing:0">${d.edits.length} edits</span></div>
          <div id="elist-${id}" style="max-height:90px;overflow-y:auto">
            ${d.edits.length?d.edits.slice(-6).reverse().map(e=>`<div style="font-size:10px;color:var(--tx2);padding:3px 0;border-bottom:1px solid #080818">✏️ ${e}</div>`).join("")
            :"<div style='font-size:10px;color:var(--tx3)'>No edits yet — save caption or add links to start tracking</div>"}
          </div>
        </div>

        <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">
          ${d.status!=="approved"?
            `<button onclick="approveDraftItem2(${id})" style="padding:8px 14px;border-radius:7px;border:none;background:#a8f0c8;color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;cursor:pointer;text-transform:uppercase">✓ Approve + Sync Cal</button>
             <button onclick="reqDraftChange(${id})" style="padding:8px 12px;border-radius:7px;border:1px solid #f0e68c33;background:transparent;color:#f0e68c;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;cursor:pointer">Request Changes</button>`:
            `<span style="padding:8px;font-size:9px;color:#a8f0c8;font-weight:700;font-family:'Syne',sans-serif">✅ APPROVED</span>`}
          <button onclick="copyDraftLink2(${id})" id="cdl-${id}" style="padding:8px 12px;border-radius:7px;border:1px solid #69C9D030;background:transparent;color:#69C9D0;font-family:'Syne',sans-serif;font-weight:700;font-size:9px;cursor:pointer;margin-left:auto">🔗 Copy No-Login Link</button>
          <button onclick="closeModal()" style="padding:8px 12px;border-radius:7px;border:1px solid var(--bdr);background:transparent;color:var(--tx2);font-family:'Syne',sans-serif;font-weight:700;font-size:9px;cursor:pointer">Close</button>
        </div>
      </div>
    </div>`;
  document.getElementById("modal-overlay").onclick=e=>{if(e.target.id==="modal-overlay")closeModal()};
};

function logEdit2(id,note){
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  const ts=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  d.edits.push(`${EDITOR} · ${ts} — ${note}`);
  const el=document.getElementById(`elist-${id}`);
  if(el)el.innerHTML=d.edits.slice(-6).reverse().map(e=>`<div style="font-size:10px;color:var(--tx2);padding:3px 0;border-bottom:1px solid #080818">✏️ ${e}</div>`).join("");
}
window.saveDraftCap=id=>{
  const v=document.getElementById(`dcap-${id}`)?.value;if(v===undefined)return;
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.cap=v;logEdit2(id,"Updated caption");
};
window.addTag2=(id,tag)=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  const t=tag.trim().startsWith("#")?tag.trim():"#"+tag.trim();
  if(!d.tags.includes(t)){d.tags.push(t);logEdit2(id,`Added tag ${t}`);}
};
window.removeTag=(id,i)=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.tags.splice(i,1);logEdit2(id,"Removed tag");
};
window.addLink2=(id,label,url)=>{
  const l=label||document.getElementById(`ll-${id}`)?.value?.trim();
  const u=url||document.getElementById(`lu-${id}`)?.value?.trim();
  if(!l||!u)return;
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.links.push({l,u});logEdit2(id,`Added link: ${l}`);
  const el=document.getElementById(`llist-${id}`);
  if(el)el.innerHTML=d.links.map((lk,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:5px 8px;background:var(--bg3);border-radius:6px">
    <a href="${lk.u}" target="_blank" style="font-size:11px;color:#69C9D0;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lk.l} ↗</a>
    <button onclick="rmLink2(${id},${i})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:14px;padding:0">×</button>
  </div>`).join("");
  const li=document.getElementById(`ll-${id}`),ui=document.getElementById(`lu-${id}`);
  if(li&&!label)li.value="";if(ui&&!url)ui.value="";
};
window.rmLink2=(id,i)=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.links.splice(i,1);logEdit2(id,"Removed link");
  const el=document.getElementById(`llist-${id}`);
  if(el)el.innerHTML=d.links.map((lk,i2)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:5px 8px;background:var(--bg3);border-radius:6px">
    <a href="${lk.u}" target="_blank" style="font-size:11px;color:#69C9D0;flex:1">${lk.l} ↗</a>
    <button onclick="rmLink2(${id},${i2})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:14px;padding:0">×</button>
  </div>`).join("");
};
window.addFile2=(id)=>{
  const name=document.getElementById(`fn-${id}`)?.value?.trim();
  const note=document.getElementById(`fno-${id}`)?.value?.trim();
  if(!name)return;
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.files.push({name,note});logEdit2(id,`Added file: ${name}`);
  const el=document.getElementById(`flist-${id}`);
  if(el)el.innerHTML=d.files.map((f,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:5px 8px;background:var(--bg3);border-radius:6px">
    <span style="font-size:11px;color:var(--tx);flex:1">📎 ${f.name}</span><span style="font-size:10px;color:var(--tx3)">${f.note||""}</span>
    <button onclick="rmFile2(${id},${i})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:14px;padding:0">×</button>
  </div>`).join("");
  const ni=document.getElementById(`fn-${id}`),noi=document.getElementById(`fno-${id}`);
  if(ni)ni.value="";if(noi)noi.value="";
};
window.rmFile2=(id,i)=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.files.splice(i,1);logEdit2(id,"Removed file");
};
window.approveDraftItem2=id=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.status="approved";logEdit2(id,"APPROVED ✅");closeModal();renderPage();
};
window.reqDraftChange=id=>{
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.status="pending";logEdit2(id,"Changes requested");closeModal();renderPage();
};
window.copyDraftLink2=id=>{
  const url=window.location.href.split('#')[0]+'#ddraft-'+id;
  if(navigator.clipboard)navigator.clipboard.writeText(url).catch(()=>{});
  const b=document.getElementById(`cdl-${id}`);
  if(b){b.textContent="✓ Link Copied!";b.style.background="#69C9D015";}
};
window.addDraftItem=()=>{
  const id=DRAFTS_DATA.length+1;
  DRAFTS_DATA.push({id,type:"Post",platform:"Instagram",title:"New Draft",status:"draft",cap:"",date:"Apr "+new Date().getDate(),tags:[],links:[],files:[],edits:[],canva:"https://www.canva.com/design/new?type=instagramPost"});
  renderPage();setTimeout(()=>openDraftEd(id),60);
};

// ═══════════ PAGE DISPATCH ═══════════
const getPage=id=>({overview:pgOverview,platforms:pgPlatforms,dsp:pgDSP,catalogue:pgCatalogue,
  chartex:pgChartex,listening:pgListening,analysis:pgAnalysis,ai:pgAI,
  campaigns:pgCampaigns,crm:pgCRM,creators:pgCRM,
  budget:pgBudget,drafts:pgDrafts,calendar:pgCalendar,partners:pgPartners}[id]||pgOverview)();

function afterRender(id){
  if(id==="overview"){
    const c=document.getElementById("tc");if(!c)return;
    const d=[22,35,61,82,110,128,155,210,248,274,318,340,360];
    const w=c.offsetWidth||400;c.width=w;c.height=54;
    const ctx=c.getContext("2d");
    ctx.strokeStyle="#c8a96e";ctx.lineWidth=1.5;ctx.beginPath();
    d.forEach((v,i)=>{const x=(i/(d.length-1))*w,y=54-((v-22)/338)*50;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
    ctx.stroke();ctx.fillStyle="#c8a96e10";ctx.lineTo(w,54);ctx.lineTo(0,54);ctx.closePath();ctx.fill();
  }
}

buildNav();renderPage();
</script>
</body>
</html>
