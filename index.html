<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Artist Intelligence — Wirehouse Media</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* ── DARK MODE (default) ── */
:root{
  --gold:#a07fd4;--gl:#c4a8e8;--gd:#a07fd422;
  --purple:#a07fd4;--purple-deep:#7B5EA7;--purple-dim:#a07fd418;
  --orange:#d7652e;--orange-dim:#d7652e18;
  --teal:#4f8285;--pink:#E1306C;--grn:#1DB954;--red:#FF0000;--blue:#1877F2;
  --bg:#080610;--bg2:#0d0a18;--bg3:#120f1f;--card:#160e24;--bdr:#2a1f42;
  --tx:#ede8f5;--tx2:#9080b0;--tx3:#4a3868;--dim:#2d1f48;
  --mode-icon:"☀️"
}
/* ── LIGHT MODE ── */
[data-theme="light"]{
  --gold:#7B5EA7;--gl:#9b7fc7;--gd:#7B5EA722;
  --purple:#7B5EA7;--purple-deep:#5a3f8a;--purple-dim:#7B5EA714;
  --orange:#d7652e;--orange-dim:#d7652e14;
  --teal:#3a6f72;--pink:#c0164a;--grn:#1a9e45;--red:#cc0000;--blue:#1565c0;
  --bg:#f5f0fa;--bg2:#ede5f7;--bg3:#e4d9f0;--card:#ffffff;--bdr:#d4c4e8;
  --tx:#1a0f2e;--tx2:#5a4478;--tx3:#9080b0;--dim:#c8b8e0;
  --mode-icon:"🌙"
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;background:rgba(5,5,13,.97);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;z-index:50}
.logo-l{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-ak{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:.25em;color:var(--purple)}
.logo-nm{font-family:'Playfair Display',serif;font-size:15px;color:var(--tx);font-style:italic}
.logo-nm span{color:var(--purple);font-style:normal}
.htabs{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none}
.htabs::-webkit-scrollbar{display:none}
.htab{padding:4px 10px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:1px solid transparent;background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .14s}
.htab.on{background:var(--gd);color:var(--purple);border-color:#a07fd42a}
.hdr-r{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--tx3);flex-shrink:0;text-transform:uppercase}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:166px;border-right:1px solid var(--bdr);background:var(--bg2);overflow-y:auto;flex-shrink:0;scrollbar-width:none;transition:width .2s ease}
.sidebar.collapsed{width:36px;overflow:hidden}
.sidebar.collapsed .sg{display:none}
.sidebar.collapsed .si span:not(.ico){display:none}
.sidebar.collapsed .si{padding:8px 0;justify-content:center}
.sidebar.collapsed .si .ico{opacity:.6;width:auto}
.sb-toggle{position:absolute;bottom:12px;left:0;width:36px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);font-size:14px;transition:color .14s;z-index:10}
.sb-toggle:hover{color:var(--purple)}
.sidebar::-webkit-scrollbar{display:none}
.sg{padding:14px 13px 3px;font-size:8px;color:var(--tx3);letter-spacing:.2em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif}
.si{padding:8px 13px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif;color:var(--tx3);border-left:2px solid transparent;cursor:pointer;transition:all .11s;display:flex;align-items:center;gap:8px}
.si.on{color:var(--purple);border-left-color:var(--purple);background:var(--purple-dim)}
.si:hover:not(.on){color:var(--tx);background:#ffffff04}
.si .ico{opacity:.38;font-size:11px;width:14px;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--dim) var(--bg)}
.pt{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;margin-bottom:1px}
.ps{font-size:9px;color:var(--tx2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;font-weight:600;font-family:'Syne',sans-serif}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:15px;margin-bottom:11px}
.cl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:7px;font-weight:700;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:11px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:13px}
.kl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;font-weight:700;font-family:'Syne',sans-serif}
.kv{font-family:'Playfair Display',serif;font-size:23px;line-height:1;margin-bottom:2px}
.ks{font-size:9px;color:#a8f0c8;margin-top:2px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);padding-bottom:7px;border-bottom:1px solid var(--bdr);padding-right:10px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
td{padding:8px 10px 8px 0;border-bottom:1px solid #080818;font-size:11px;vertical-align:middle}
.trow:hover{background:#c8a96e04;cursor:pointer}
a{color:var(--teal);text-decoration:none}a:hover{opacity:.7;text-decoration:underline}
.dl{font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border-radius:3px;padding:2px 6px;display:inline-block;text-decoration:none;margin-right:2px;border:1px solid currentColor;opacity:.8}
.dl:hover{opacity:1;text-decoration:none}
.btn{padding:7px 14px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:none;background:var(--purple);color:#fff;cursor:pointer;transition:all .14s}
.btn:hover{background:var(--purple-deep)}
.bsm{padding:5px 10px;font-size:9px}
.btno{padding:5px 11px;border-radius:7px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.btno:hover{border-color:var(--gd);color:var(--gold)}
.chip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.chip.on{border-color:#a07fd455;background:var(--gd);color:var(--purple)}
.inp{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--tx);outline:none;font-family:'DM Mono',monospace;width:100%;transition:border .14s}
.inp:focus{border-color:#a07fd444}
.bge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:'Syne',sans-serif;display:inline-block}
.bge-live{background:#1DB95418;color:#1DB954;border:1px solid #1DB95433}
.bge-wait{background:#f0e68c14;color:#f0e68c;border:1px solid #f0e68c28}
.bge-cx{background:#69C9D014;color:#69C9D0;border:1px solid #69C9D028}
.an{background:var(--purple-dim);border:1px solid #a07fd425;border-radius:7px;padding:7px 11px;font-size:9px;color:var(--purple);margin-bottom:11px;line-height:1.9;opacity:.85}
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
.br{margin-bottom:7px}
.brl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.brl span:first-child{color:#aaa}
.brt{height:3px;background:#10102a;border-radius:2px}
.brf{height:100%;border-radius:2px}
.loading{color:var(--tx2);font-size:11px;padding:18px;text-align:center;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
.err{color:#f09a9a;font-size:11px;padding:11px 13px;background:#f09a9a08;border:1px solid #f09a9a1a;border-radius:8px;line-height:1.9}
.ok{color:#a8f0c8;font-size:11px;padding:7px 11px;background:#a8f0c808;border:1px solid #a8f0c81a;border-radius:7px;margin-bottom:9px}
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:340px}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:10px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
.ai-u{align-self:flex-end;max-width:78%;padding:9px 13px;border-radius:10px 10px 2px 10px;background:var(--purple-dim);border:1px solid #a07fd428;font-size:11px;line-height:1.7;color:var(--purple);white-space:pre-wrap}
.ai-a{align-self:flex-start;max-width:84%;padding:9px 13px;border-radius:10px 10px 10px 2px;background:var(--bg3);border:1px solid var(--bdr);font-size:11px;line-height:1.7;color:#ccc;white-space:pre-wrap}
.ai-a a{color:var(--teal)}
.typing{display:flex;gap:4px;padding:8px 13px;align-self:flex-start;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:db 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cday{min-height:48px;border-radius:6px;padding:4px 5px;border:1px solid #0e0e1e;transition:transform .1s}
.cday.hev{cursor:pointer}.cday.hev:hover{transform:scale(1.05);z-index:2}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:#08081a;border:1px solid var(--bdr);border-radius:12px;padding:22px;max-width:600px;width:92%;max-height:88vh;overflow-y:auto}
.ec{padding:4px 6px;border-radius:4px;border:1px solid transparent;background:transparent;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx);width:100%;transition:all .13s}
.ec:focus{border-color:var(--gd);background:var(--bg);outline:none}
select.ec option{background:var(--bg2)}
.camp-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);margin-bottom:8px;cursor:pointer}
.camp-hdr:hover{opacity:.8}
.pg{animation:pgIn .2s ease}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.codeblock{background:#05050f;border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:9px;color:#a8f0c8;line-height:1.9;overflow-x:auto;white-space:pre}
/* Jessi session sidebar */
.jessi-shell{display:flex;gap:0;height:calc(100vh - 200px);min-height:400px}
.jessi-hist{width:190px;flex-shrink:0;border:1px solid var(--bdr);border-right:none;border-radius:9px 0 0 9px;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.jessi-chat{flex:1;display:flex;flex-direction:column;border:1px solid var(--bdr);border-radius:0 9px 9px 0;background:var(--card);overflow:hidden}
.jss-item{padding:9px 11px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.jss-item:hover{background:#c8a96e08}
.jss-item.on{background:#c8a96e0d;border-left:2px solid var(--gold)}
.jss-title{font-size:10px;color:var(--tx);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.jss-meta{font-size:9px;color:var(--tx3)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo-l"><span class="logo-ak">AK</span><span class="logo-nm">Artist <span>Intelligence</span></span></div>
    <div class="htabs" id="htabs"></div>
    <button id="theme-btn" onclick="toggleTheme()" style="background:none;border:1px solid var(--bdr);border-radius:6px;color:var(--tx2);cursor:pointer;padding:4px 8px;font-size:11px;margin-right:6px;transition:all .14s" title="Toggle light/dark mode">☀️</button>
<div class="hdr-r">Wirehouse Media</div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"></div><div class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Toggle navigation">◀</div>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="mroot"></div>
<script>
const API="https://ak-intelligence-backend.onrender.com";
const AK_SP_ID="3DiDSECUqqY1AuBP8qtaIa";

async function apicall(path,opts={}){
  const r=await fetch(API+path,{headers:{"Content-Type":"application/json",...(opts.headers||{})},...opts});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.substring(0,200)}`);}
  return r.json();
}
const AT={
  list:(t,f)=>apicall(`/airtable/${encodeURIComponent(t)}${f?`?filterByFormula=${encodeURIComponent(f)}`:""}`).then(d=>d.records||[]),
  create:(t,fields)=>apicall(`/airtable/${encodeURIComponent(t)}`,{method:"POST",body:JSON.stringify(fields)}),
  update:(t,id,fields)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"PATCH",body:JSON.stringify(fields)}),
  del:(t,id)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"DELETE"}),
};
const enc=encodeURIComponent;
const G="#c8a96e",Tl="#69C9D0",Rd="#E1306C",Gr="#1DB954";
const ST={contracted:"#a8f0c8",approved:"#a8f0c8",active:"#a8f0c8","draft review":"#c8a96e",negotiating:"#f0e68c","outreach sent":"#69C9D0",draft:"#888",evaluating:"#f0e68c",pending:"#f0e68c"};
const TC={owned:"#c8a96e",influencer:"#69C9D0",dsp:"#1DB954",pr:"#E1306C",paid:"#9b59b6",report:"#888"};
const PC={News:"#c8a96e",TikTok:"#69C9D0",Reddit:"#FF4500",Blogs:"#a8f0c8",LinkedIn:"#1877F2",YouTube:"#FF0000",Instagram:"#E1306C",Quora:"#A82400"};
const fmt=n=>{if(!n&&n!==0)return"–";n=parseInt(n);return n>=1e9?(n/1e9).toFixed(1)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?Math.round(n/1e3)+"K":String(n)};
const pill=(c,t)=>`<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}30">${t}</span>`;
const bar=(l,v,p,c)=>`<div class="br"><div class="brl"><span>${l}</span><span style="color:${c};font-family:'Playfair Display',serif">${v}</span></div><div class="brt"><div class="brf" style="width:${Math.min(p,100)}%;background:${c}"></div></div></div>`;
const kpi=(l,v,s,c,b)=>`<div class="kpi"><div class="kl">${l}${b?` <span class="bge bge-${b}">${b==="live"?"✅ LIVE":b==="wait"?"🔒 API":"⚡"}</span>`:""}</div><div class="kv" style="color:${c||"var(--tx)"}">${v}</div>${s?`<div class="ks">↑ ${s}</div>`:""}</div>`;

// ═══ NAV ═══
const NAV=[
  {g:"Analytics",items:[{id:"overview",l:"Overview",i:"◈"},{id:"platforms",l:"Platforms",i:"⊕"},{id:"dsp",l:"DSP & Streaming",i:"♫"},{id:"catalogue",l:"Full Catalogue",i:"♪"},{id:"chartex",l:"ChartEx Live",i:"⚡"},{id:"campaignreport",l:"Campaign Report",i:"◉"},{id:"viral",l:"Viral Analyzer",i:"🔬"},{id:"listening",l:"Social Listening",i:"◎"}]},
  {g:"Intelligence",items:[{id:"ai",l:"Hey Jessi ✦",i:"✦"}]},
  {g:"Campaigns",items:[{id:"campaigns",l:"Campaign Manager",i:"◉"},{id:"crm",l:"Creator CRM",i:"◈"},{id:"budget",l:"Budget Tracker",i:"▣"},{id:"calendar",l:"Calendar & Canva",i:"□"},{id:"drafts",l:"Content Drafts",i:"◇"}]},
  {g:"Operations",items:[{id:"contracts",l:"Contracts",i:"📄"},{id:"partners",l:"Partners & APIs",i:"⊕"}]},
];
let CUR="overview";
// ── THEME TOGGLE ──
let _theme = localStorage.getItem('wm_theme') || 'dark';
function applyTheme(t){
  _theme = t;
  document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : '');
  const btn = document.getElementById('theme-btn');
  if(btn) btn.textContent = t === 'light' ? '🌙' : '☀️';
  localStorage.setItem('wm_theme', t);
}
window.toggleTheme = () => applyTheme(_theme === 'dark' ? 'light' : 'dark');

let sidebarCollapsed=false;
window.toggleSidebar=()=>{
  sidebarCollapsed=!sidebarCollapsed;
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sb-toggle');
  if(sb)sb.classList.toggle('collapsed',sidebarCollapsed);
  if(btn)btn.textContent=sidebarCollapsed?'▶':'◀';
  // Update toggle position
  if(btn)btn.style.left=sidebarCollapsed?'0':'';
};
function buildNav(){
  const all=NAV.flatMap(g=>g.items);
  document.getElementById("htabs").innerHTML=all.map(({id,l})=>`<button class="htab ${id===CUR?"on":""}" onclick="go('${id}')">${l}</button>`).join("");
  document.getElementById("sidebar").innerHTML=NAV.map(({g,items})=>`<div class="sg">${g}</div>${items.map(({id,l,i})=>`<div class="si ${id===CUR?"on":""}" onclick="go('${id}')"><span class="ico">${i}</span>${l}</div>`).join("")}`).join("");
}
window.go=id=>{CUR=id;buildNav();renderPage()};
function renderPage(){
  const p=NAV.flatMap(g=>g.items).find(x=>x.id===CUR)||NAV[0].items[0];
  document.getElementById("main").innerHTML=`<div class="pt">${p.l}</div><div class="ps">Alicia Keys · Wirehouse Media</div><div class="pg">${getPage(CUR)}</div>`;
  afterRender(CUR);
}
window.closeModal=()=>{document.getElementById("mroot").innerHTML=""};

// ── Universal link preview helper ──
window.previewLink=(url,containerId)=>{
  const el=document.getElementById(containerId);if(!el||!url)return;
  let plat="Link",color="#69C9D0",icon="🔗";
  if(url.includes("tiktok"))    {plat="TikTok";color="#69C9D0";icon="♪";}
  else if(url.includes("instagram")){plat="Instagram";color="#E1306C";icon="📷";}
  else if(url.includes("youtube")||url.includes("youtu.be")){plat="YouTube";color="#FF0000";icon="▶";}
  else if(url.includes("drive.google")){plat="Google Drive";color="#c8a96e";icon="📁";}
  else if(url.includes("canva"))    {plat="Canva";color="#7D2AE8";icon="🎨";}
  else if(url.includes("chartex")) {plat="ChartEx";color="#69C9D0";icon="⚡";}
  el.innerHTML=`<div style="display:inline-flex;align-items:center;gap:8px;padding:5px 10px;background:${color}0d;border:1px solid ${color}33;border-radius:6px;margin-top:5px">
    <span>${icon}</span>
    <span style="font-size:10px;color:${color};font-weight:700">${plat}</span>
    <a href="${url}" target="_blank" style="font-size:9px;color:${color};text-decoration:none;opacity:.7">Open ↗</a>
  </div>`;
};

// ═══ CALENDAR DATA ═══
const CAL={
  4:{l:"IG Story Drop",t:"owned",cap:"New music is in the air 💜 Something special coming very soon… 🎹✨ #AliciaKeys",st:"pending"},
  7:{l:"TikTok Creator Wave",t:"influencer",cap:"Use the sound and show us your version! 🔥 #AliciaKeys #TrySleeping",st:"approved"},
  12:{l:"Con Cora Gala Recap",t:"owned",cap:"The performance everyone is talking about 💜 Alicia Keys + Karol G at Con Cora Gala — pure magic. #AliciaKeys #KarolG #ConCoraGala",st:"pending"},
  18:{l:"Creator Draft Due",t:"influencer",cap:"All creators submit drafts for review today. Jade Elia & DeeJ Music — TikTok sound: Try Sleeping with a Broken Heart.",st:""},
  21:{l:"X Campaign",t:"paid",cap:"",st:""},
  24:{l:"FB Live Promo",t:"owned",cap:"Going LIVE this Sunday 💜 Intimate conversation about music, healing, and what's next 🎹 #AliciaKeys",st:"draft"},
  28:{l:"Monthly Report",t:"report",cap:"",st:""},
};
const calComments={};
const calExtra={};
function getCalExtra(d){if(!calExtra[d])calExtra[d]={cap:CAL[d]?.cap||"",files:[],links:[],sounds:[],edits:[]};return calExtra[d];}

// ═══ FEED DATA ═══

function pgCatalogue(){
  const total=ALBUMS.reduce((a,al)=>a+al.songs.length,0);
  let html=`<div class="an">✅ ${total} songs · ${ALBUMS.length} releases · ⚡ ChartEx = full song analytics page · TikTok sound pages with real IDs · All Apple Music links = search</div>
<div style="display:flex;gap:8px;margin-bottom:11px;align-items:center;flex-wrap:wrap">
  <input class="inp" id="catQ" placeholder="Search any song or album…" style="max-width:240px" oninput="filterCat()">
  <label style="font-size:10px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:5px"><input type="checkbox" id="singlesOnly" onchange="filterCat()" style="accent-color:#c8a96e"> Singles only</label>
  <span style="font-size:9px;color:var(--tx2);margin-left:auto">${total} songs · ${ALBUMS.length} releases</span>
</div>`;
  ALBUMS.forEach(al=>{
    html+=`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <div><div style="font-weight:700;font-size:13px;color:var(--gold);font-family:'Syne',sans-serif">${al.t}</div><div style="font-size:10px;color:var(--tx2);margin-top:1px">${al.y}</div></div>
        <a href="https://chartex.com/artist/alicia-keys-9779" target="_blank" class="dl" style="color:#69C9D0">⚡ AK on ChartEx ↗</a>
      </div>
      <table><thead><tr><th>Song</th><th>⚡ ChartEx</th><th>TikTok Sound</th><th>Spotify</th><th>Apple</th><th>YouTube</th><th>More</th></tr></thead><tbody>
      ${al.songs.map(s=>`<tr class="trow song-row${s.x?" is-single":""}">
        <td>
          <span style="font-weight:${s.x?700:400};color:${s.hot?"var(--gold)":"var(--tx)"};font-family:'Syne',sans-serif;font-size:11px">${s.s}</span>
          ${s.x?`<span class="bge bge-cx" style="margin-left:4px">Single</span>`:""}
          ${s.hot?`<span class="bge" style="background:#f09a9a14;color:#f09a9a;border:1px solid #f09a9a28;margin-left:3px">🔥</span>`:""}
        </td>
        <td><a href="${s.cx}" target="_blank" class="dl" style="color:#69C9D0">⚡</a></td>
        <td><a href="${s.tk}" target="_blank" class="dl" style="color:#69C9D0">♪</a></td>
        <td><a href="${s.sp}" target="_blank" class="dl" style="color:#1DB954">SP</a></td>
        <td><a href="${s.am}" target="_blank" class="dl" style="color:#FC3C44">AM</a></td>
        <td><a href="${s.yt}" target="_blank" class="dl" style="color:#FF0000">YT</a></td>
        <td><a href="https://music.amazon.com/search/${enc(s.s+' Alicia Keys')}" target="_blank" class="dl" style="color:#00A8E0">AZ</a>
            <a href="https://tidal.com/search?q=${enc(s.s+' Alicia Keys')}" target="_blank" class="dl" style="color:#aaa">TD</a></td>
      </tr>`).join("")}</tbody></table></div>`;
  });
  return html;
}
window.filterCat=()=>{
  const q=(document.getElementById("catQ")||{}).value?.toLowerCase()||"";
  const so=document.getElementById("singlesOnly")?.checked||false;
  document.querySelectorAll(".song-row").forEach(r=>{
    const txt=r.querySelector("td")?.textContent?.toLowerCase()||"";
    r.style.display=(!q||txt.includes(q))&&(!so||r.classList.contains("is-single"))?"":"none";
  });
};

function jessiSaveSession(){
  if(!aiHist.length||!jessiCurrentSessionId)return;
  const title=aiHist.find(m=>m.role==="user")?.content?.substring(0,52)||"Session";
  const mode=jessiMode;
  const idx=jessiSessions.findIndex(s=>s.id===jessiCurrentSessionId);
  const s={id:jessiCurrentSessionId,title,mode,ts:new Date().toLocaleString(),messages:[...aiHist]};
  if(idx>=0)jessiSessions[idx]=s;else jessiSessions.unshift(s);
  jessiSessions=jessiSessions.slice(0,30);
  localStorage.setItem("wm_jessi_sessions",JSON.stringify(jessiSessions));
  renderJessiSessions();
}
function jessiLoadSession(id){
  const s=jessiSessions.find(x=>x.id===id);if(!s)return;
  jessiCurrentSessionId=s.id;
  aiHist.length=0;s.messages.forEach(m=>aiHist.push(m));
  if(s.mode&&s.mode!==jessiMode){jessiMode=s.mode;setJessiMode(s.mode,true);}
  const el=document.getElementById("ai-msgs");
  if(el){el.innerHTML="";aiHist.forEach(m=>{el.innerHTML+=m.role==="user"?`<div class="ai-u">${m.content}</div>`:`<div class="ai-a">${formatAIResponse(m.content)}</div>`;});el.scrollTop=el.scrollHeight;}
  renderJessiSessions();
}
function jessiDeleteSession(id,e){
  e.stopPropagation();
  if(!confirm("Delete this session?"))return;
  jessiSessions=jessiSessions.filter(s=>s.id!==id);
  localStorage.setItem("wm_jessi_sessions",JSON.stringify(jessiSessions));
  if(jessiCurrentSessionId===id){aiHist.length=0;jessiCurrentSessionId=null;const el=document.getElementById("ai-msgs");if(el)el.innerHTML="";}
  renderJessiSessions();
}
function renderJessiSessions(){
  const el=document.getElementById("jessi-hist-list");if(!el)return;
  const modeFilter=jessiMode;
  // Show sessions filtered by current mode, plus all if chat mode
  const filtered=modeFilter==="chat"?jessiSessions:jessiSessions.filter(s=>!s.mode||s.mode===modeFilter||s.mode==="chat");
  if(!filtered.length){el.innerHTML=`<div style="padding:12px 11px;font-size:10px;color:var(--tx3);line-height:1.8">No ${modeFilter==="chat"?"saved":"past "+modeFilter} sessions yet.<br>Start chatting to save.</div>`;return;}

function jessiBuildClaudeUrl(){

function buildJessiContext(){
  const sony=jessiSonyData.trim()?`\n\nSONY / DSP DATA:\n${jessiSonyData}\n\nPlease incorporate this data.`:"";
  const modes={
    chat:"",
    coverage:"\n\nMODE: COVERAGE REPORT. Generate a professional coverage report matching the AK x Karol G Con Cora Gala format. Include: Executive summary, Total reach, Key narratives with post examples and engagement, Top performing content with links, Streaming & discovery impact (worldwide + Latin), TikTok creates and views, Key insights, Trends, Recommendations. Use real numbers.",
    shotlist:"\n\nMODE: SHOTLIST. Generate a detailed shotlist/capture plan. Include: timing, location, concept name, reference links, time estimate, thumbnail checkpoints, content type (TikTok/IG/Story), and notes. Be specific and actionable.",
    copy:"\n\nMODE: COPY. Write in Alicia Keys' authentic voice — warm, powerful, spiritual, soulful, real. She speaks to her 'family' (fans). She is authentic, not corporate. She celebrates women, healing, music, and community. Match platform tone: IG = intimate and beautiful, TikTok = playful and current, Newsletter = personal and deep, Press Release = warm but professional.",
  };
  return(modes[jessiMode]||"")+sony;

function formatAIResponse(reply){
  return reply.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1 ↗</a>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--gold)">$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<div style="font-family:Playfair Display,serif;font-size:14px;color:var(--gold);margin:10px 0 4px">$1</div>')
    .replace(/\n/g,"<br>");
}

window.saveBudgetLine=async id=>{
  const l=budgetData.lines.find(x=>x.id===id);if(!l)return;
  l.name=document.getElementById(`bn-${id}`)?.value||l.name;
  l.platform=document.getElementById(`bpl-${id}`)?.value||l.platform;
  l.total=parseFloat(document.getElementById(`bt-${id}`)?.value)||l.total;
  l.spent=parseFloat(document.getElementById(`bs-${id}`)?.value)||l.spent;
  l.st=document.getElementById(`bst-${id}`)?.value||l.st;
  l.agent=document.getElementById(`bag-${id}`)?.value||"";
  l.agentEmail=document.getElementById(`bae-${id}`)?.value||"";
  l.turnAround=document.getElementById(`bta-${id}`)?.value||l.turnAround;
  l.notes=document.getElementById(`bno-${id}`)?.value||"";
  const btn=document.querySelector(`#br-${id} .btn`);
  if(btn){btn.textContent="Saving…";btn.disabled=true;}
  try{
    if(!id.startsWith("local"))await AT.update("Budget",id,{Name:l.name,Campaign:l.camp,Platform:l.platform,Budget:l.total,Spent:l.spent,Status:l.st,Agent:l.agent,AgentEmail:l.agentEmail,Notes:l.notes});
    if(btn){btn.textContent="✓ Saved";btn.style.background="#a8f0c8";btn.style.color="#000";}
    setTimeout(()=>{if(btn){btn.textContent="Save";btn.style.background="";btn.style.color="";btn.disabled=false;}},2000);
    refreshBudgetSummary();
  }catch(e){if(btn){btn.textContent="Retry";btn.disabled=false;}}
};
window.addBudgetLine=(camp)=>{
  const id="local-"+Date.now();
  budgetData.lines.push({id,name:"New Line",camp:camp||"April Campaign",cat:"influencer",platform:"TikTok",total:0,spent:0,st:"outreach sent",agent:"",agentEmail:"",turnAround:"5 days",notes:"",crmId:""});
  renderPage();setTimeout(()=>{document.getElementById(`bn-${id}`)?.focus();},100);
};
window.refreshBudgetSummary=()=>{budgetData.lines.forEach(l=>{const t=document.getElementById(`bt-${l.id}`);const s=document.getElementById(`bs-${l.id}`);if(t)l.total=parseFloat(t.value)||0;if(s)l.spent=parseFloat(s.value)||0;});};
window.exportBudget=()=>{
  const csv=[["Name","Campaign","Category","Platform","Budget","Spent","Remaining","Status","Agent","Agent Email","Turnaround","Notes"],...budgetData.lines.map(l=>[l.name,l.camp,l.cat,l.platform,l.total,l.spent,l.total-l.spent,l.st,l.agent,l.agentEmail,l.turnAround,l.notes])].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="ak_budget.csv";a.click();
};

    <div style="font-weight:700;font-size:12px;font-family:'Syne',sans-serif;margin-bottom:4px">${d.title}</div>

function logEdit(id,note){
  const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;
  d.edits.push(`${EDITOR} · ${new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})} — ${note}`);
}

window.saveDraftCap=id=>{const v=document.getElementById(`dcap-${id}`)?.value;if(v===undefined)return;const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.cap=v;logEdit(id,"Updated caption");const el=document.getElementById(`elist-${id}`);if(el)el.innerHTML=d.edits.slice(-6).reverse().map(e=>`<div style="font-size:10px;color:var(--tx2);padding:3px 0;border-bottom:1px solid #080818">✏️ ${e}</div>`).join("");};
window.addTag=(id,tag)=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;const t=tag.trim().startsWith("#")?tag.trim():"#"+tag.trim();if(!d.tags.includes(t)){d.tags.push(t);logEdit(id,"Added tag "+t);}};
window.removeTag=(id,i)=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.tags.splice(i,1);logEdit(id,"Removed tag");};
window.addLink=(id,label,url)=>{const l=label||document.getElementById(`ll-${id}`)?.value?.trim();const u=url||document.getElementById(`lu-${id}`)?.value?.trim();if(!l||!u)return;const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.links.push({l,u});logEdit(id,"Added link: "+l);const el=document.getElementById(`llist-${id}`);if(el)el.innerHTML=d.links.map((lk,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:5px 8px;background:var(--bg3);border-radius:6px"><a href="${lk.u}" target="_blank" style="font-size:11px;color:#69C9D0;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${lk.l} ↗</a><button onclick="rmLink(${id},${i})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:14px;padding:0">×</button></div>`).join("");const li=document.getElementById(`ll-${id}`),ui=document.getElementById(`lu-${id}`);if(li&&!label)li.value="";if(ui&&!url)ui.value="";};
window.rmLink=(id,i)=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.links.splice(i,1);logEdit(id,"Removed link");openDraftEditor(id);};
window.addFile=(id)=>{const name=document.getElementById(`fn-${id}`)?.value?.trim();const note=document.getElementById(`fno-${id}`)?.value?.trim();if(!name)return;const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.files.push({name,note});logEdit(id,"Added file: "+name);const el=document.getElementById(`flist-${id}`);if(el)el.innerHTML=d.files.map((f,i)=>`<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px;padding:5px 8px;background:var(--bg3);border-radius:6px"><span style="font-size:11px;flex:1">📎 ${f.name}</span><span style="font-size:10px;color:var(--tx3)">${f.note||""}</span><button onclick="rmFile(${id},${i})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:14px;padding:0">×</button></div>`).join("");const ni=document.getElementById(`fn-${id}`),noi=document.getElementById(`fno-${id}`);if(ni)ni.value="";if(noi)noi.value="";};
window.rmFile=(id,i)=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.files.splice(i,1);logEdit(id,"Removed file");openDraftEditor(id);};
window.approveDraft=id=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.status="approved";logEdit(id,"APPROVED ✅");closeModal();renderPage();};
window.reqDraftChange=id=>{const d=DRAFTS_DATA.find(x=>x.id===id);if(!d)return;d.status="pending";logEdit(id,"Changes requested");closeModal();renderPage();};
window.copyDraftLink=id=>{const url=window.location.href.split("#")[0]+"#ddraft-"+id;if(navigator.clipboard)navigator.clipboard.writeText(url).catch(()=>{});const b=event.target;if(b){b.textContent="✓ Copied!";setTimeout(()=>b.textContent="🔗 Copy No-Login Link",2000);}};
window.addDraftItem=()=>{const id=DRAFTS_DATA.length+1;DRAFTS_DATA.push({id,type:"Post",platform:"Instagram",title:"New Draft",status:"draft",cap:"",date:"Apr "+new Date().getDate(),tags:[],links:[],files:[],edits:[],canva:"https://www.canva.com/design/new?type=instagramPost"});renderPage();setTimeout(()=>openDraftEditor(id),60);};

function contractRow(c){

    <td><input class="ec" id="ctd-${c.id}" value="${c.desc}" style="min-width:140px"></td>
    <td><input class="ec" id="ctt-${c.id}" value="${c.type}" style="min-width:100px"></td>
    <td><select class="ec" id="ctc-${c.id}" style="min-width:120px;font-size:10px">${campOpts}</select></td>
    <td><input class="ec" id="ctr-${c.id}" value="${c.rate}" style="min-width:80px;color:#c8a96e"></td>

}
window.saveContract=id=>{
  const c=contractsData.find(x=>x.id===id);if(!c)return;
  c.desc=document.getElementById(`ctd-${id}`)?.value||c.desc;
  c.type=document.getElementById(`ctt-${id}`)?.value||c.type;
  c.camp=document.getElementById(`ctc-${id}`)?.value||c.camp;
  c.rate=document.getElementById(`ctr-${id}`)?.value||c.rate;
  c.start=document.getElementById(`cts-${id}`)?.value||c.start;
  c.expiry=document.getElementById(`cte-${id}`)?.value||c.expiry;
  c.status=document.getElementById(`ctst-${id}`)?.value||c.status;
  c.notes=document.getElementById(`ctn-${id}`)?.value||c.notes;
  c.drive=document.getElementById(`ctdr-${id}`)?.value||"";

function afterRender(id){
  if(id==="overview"){
    const c=document.getElementById("tc");if(!c)return;
    const d=[22,35,61,82,110,128,155,210,248,274,318,340,360];
    const w=c.offsetWidth||400;c.width=w;c.height=54;
    const ctx=c.getContext("2d");
    ctx.strokeStyle="#c8a96e";ctx.lineWidth=1.5;ctx.beginPath();
    d.forEach((v,i)=>{const x=(i/(d.length-1))*w,y=54-((v-22)/338)*50;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});
    ctx.stroke();ctx.fillStyle="#c8a96e10";ctx.lineTo(w,54);ctx.lineTo(0,54);ctx.closePath();ctx.fill();
  }
  if(id==="ai"){
    renderJessiSessions();
    const msgs=document.getElementById("ai-msgs");if(msgs)msgs.scrollTop=msgs.scrollHeight;
  }
}
