<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Artist Intelligence — Wirehouse Media</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
/* ── DARK MODE (default) ── */
:root{
  --gold:#a07fd4;--gl:#c4a8e8;--gd:#a07fd422;
  --purple:#a07fd4;--purple-deep:#7B5EA7;--purple-dim:#a07fd418;
  --orange:#d7652e;--orange-dim:#d7652e18;
  --teal:#4f8285;--pink:#E1306C;--grn:#1DB954;--red:#FF0000;--blue:#1877F2;
  --bg:#080610;--bg2:#0d0a18;--bg3:#120f1f;--card:#160e24;--bdr:#2a1f42;
  --tx:#ede8f5;--tx2:#9080b0;--tx3:#4a3868;--dim:#2d1f48;
  --mode-icon:"☀️"
}
/* ── LIGHT MODE ── */
[data-theme="light"]{
  --gold:#7B5EA7;--gl:#9b7fc7;--gd:#7B5EA722;
  --purple:#7B5EA7;--purple-deep:#5a3f8a;--purple-dim:#7B5EA714;
  --orange:#d7652e;--orange-dim:#d7652e14;
  --teal:#3a6f72;--pink:#c0164a;--grn:#1a9e45;--red:#cc0000;--blue:#1565c0;
  --bg:#f5f0fa;--bg2:#ede5f7;--bg3:#e4d9f0;--card:#ffffff;--bdr:#d4c4e8;
  --tx:#1a0f2e;--tx2:#5a4478;--tx3:#9080b0;--dim:#c8b8e0;
  --mode-icon:"🌙"
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Mono',monospace}
#app{display:flex;flex-direction:column;height:100vh}
.hdr{height:52px;background:var(--bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 12px 0 46px;gap:8px;flex-shrink:0;z-index:50}
.logo-l{display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-ak{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:.25em;color:var(--purple)}
.logo-nm{font-family:'Playfair Display',serif;font-size:15px;color:var(--tx);font-style:italic}
.logo-nm span{color:var(--purple);font-style:normal}
.htabs{display:flex;gap:1px;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0}
.htabs::-webkit-scrollbar{display:none}
.htab{padding:4px 10px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:1px solid transparent;background:transparent;color:var(--tx3);cursor:pointer;white-space:nowrap;transition:all .14s}
.htab.on{background:var(--gd);color:var(--purple);border-color:#a07fd42a}
.hdr-r{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:.15em;color:var(--tx3);flex-shrink:0;text-transform:uppercase}
.body{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:166px;border-right:1px solid var(--bdr);background:var(--bg2);overflow-y:auto;flex-shrink:0;scrollbar-width:none;transition:width .22s ease;display:flex;flex-direction:column;position:relative}
.sidebar::-webkit-scrollbar{display:none}
.sidebar.collapsed{width:36px;overflow:hidden}
.sidebar.collapsed .sg{display:none}
.sidebar.collapsed .si span:not(.ico){display:none}
.sidebar.collapsed .si{padding:8px 0;justify-content:center}
.sidebar.collapsed .si .ico{opacity:.7;width:auto}
.sidebar.collapsed .sb-bottom{padding:6px 0}
.sidebar.collapsed #theme-btn{font-size:13px;padding:4px 0;width:100%}
.sb-bottom{margin-top:auto;padding:10px 10px 10px;border-top:1px solid var(--bdr);flex-shrink:0}
#theme-btn{background:none;border:1px solid var(--bdr);border-radius:6px;color:var(--tx2);cursor:pointer;padding:5px 8px;font-size:11px;width:100%;transition:all .14s;text-align:left;display:flex;align-items:center;gap:6px}
#theme-btn:hover{border-color:var(--purple);color:var(--purple)}
.sb-toggle{position:fixed;top:12px;left:10px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:14px;transition:color .14s,border-color .14s;z-index:500;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;line-height:1;flex-shrink:0}
.sb-toggle:hover{color:var(--purple);border-color:var(--purple)}
@media(max-width:600px){
  .sidebar{width:0;overflow:hidden;position:fixed;height:100vh;top:0;left:0;z-index:200;box-shadow:4px 0 28px rgba(0,0,0,.6)}
  .sidebar.mob-open{width:166px;overflow-y:auto}
  .htabs{display:flex}
  .hdr-r{font-size:8px;letter-spacing:.08em}
}
.sidebar::-webkit-scrollbar{display:none}
.sg{padding:14px 13px 3px;font-size:8px;color:var(--tx3);letter-spacing:.2em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif}
.si{padding:8px 13px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;font-family:'Syne',sans-serif;color:var(--tx3);border-left:2px solid transparent;cursor:pointer;transition:all .11s;display:flex;align-items:center;gap:8px}
.si.on{color:var(--purple);border-left-color:var(--purple);background:var(--purple-dim)}
.si:hover:not(.on){color:var(--tx);background:#ffffff04}
.si .ico{opacity:.38;font-size:11px;width:14px;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--dim) var(--bg)}
.pt{font-family:'Playfair Display',serif;font-size:21px;font-weight:400;margin-bottom:1px}
.ps{font-size:9px;color:var(--tx2);letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;font-weight:600;font-family:'Syne',sans-serif}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:15px;margin-bottom:11px}
.cl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:7px;font-weight:700;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:11px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:11px}
.kpi{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:13px}
.kl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx2);margin-bottom:4px;font-weight:700;font-family:'Syne',sans-serif}
.kv{font-family:'Playfair Display',serif;font-size:23px;line-height:1;margin-bottom:2px}
.ks{font-size:9px;color:#a8f0c8;margin-top:2px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);padding-bottom:7px;border-bottom:1px solid var(--bdr);padding-right:10px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
td{padding:8px 10px 8px 0;border-bottom:1px solid #080818;font-size:11px;vertical-align:middle}
.trow:hover{background:#c8a96e04;cursor:pointer}
a{color:var(--teal);text-decoration:none}a:hover{opacity:.7;text-decoration:underline}
.dl{font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border-radius:3px;padding:2px 6px;display:inline-block;text-decoration:none;margin-right:2px;border:1px solid currentColor;opacity:.8}
.dl:hover{opacity:1;text-decoration:none}
.btn{padding:7px 14px;border-radius:7px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Syne',sans-serif;border:none;background:var(--purple);color:#fff;cursor:pointer;transition:all .14s}
.btn:hover{background:var(--purple-deep)}
.bsm{padding:5px 10px;font-size:9px}
.btno{padding:5px 11px;border-radius:7px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.btno:hover{border-color:var(--gd);color:var(--gold)}
.chip{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;border:1px solid var(--bdr);background:transparent;color:var(--tx2);cursor:pointer;transition:all .14s}
.chip.on{border-color:#a07fd455;background:var(--gd);color:var(--purple)}
.inp{background:var(--bg);border:1px solid var(--bdr);border-radius:7px;padding:7px 11px;font-size:11px;color:var(--tx);outline:none;font-family:'DM Mono',monospace;width:100%;transition:border .14s}
.inp:focus{border-color:#a07fd444}
.bge{padding:1px 6px;border-radius:3px;font-size:8px;font-weight:700;font-family:'Syne',sans-serif;display:inline-block}
.bge-live{background:#1DB95418;color:#1DB954;border:1px solid #1DB95433}
.bge-wait{background:#f0e68c14;color:#f0e68c;border:1px solid #f0e68c28}
.bge-cx{background:#69C9D014;color:#69C9D0;border:1px solid #69C9D028}
.an{background:var(--purple-dim);border:1px solid #a07fd425;border-radius:7px;padding:7px 11px;font-size:9px;color:var(--purple);margin-bottom:11px;line-height:1.9;opacity:.85}
.pill{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;white-space:nowrap}
.br{margin-bottom:7px}
.brl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.brl span:first-child{color:#aaa}
.brt{height:3px;background:#10102a;border-radius:2px}
.brf{height:100%;border-radius:2px}
.loading{color:var(--tx2);font-size:11px;padding:18px;text-align:center;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:.2}50%{opacity:1}}
.err{color:#f09a9a;font-size:11px;padding:11px 13px;background:#f09a9a08;border:1px solid #f09a9a1a;border-radius:8px;line-height:1.9}
.ok{color:#a8f0c8;font-size:11px;padding:7px 11px;background:#a8f0c808;border:1px solid #a8f0c81a;border-radius:7px;margin-bottom:9px}
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:340px}
.ai-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:10px;scrollbar-width:thin;scrollbar-color:var(--dim) transparent}
.ai-u{align-self:flex-end;max-width:78%;padding:9px 13px;border-radius:10px 10px 2px 10px;background:var(--purple-dim);border:1px solid #a07fd428;font-size:11px;line-height:1.7;color:var(--purple);white-space:pre-wrap}
.ai-a{align-self:flex-start;max-width:84%;padding:9px 13px;border-radius:10px 10px 10px 2px;background:var(--bg3);border:1px solid var(--bdr);font-size:11px;line-height:1.7;color:#ccc;white-space:pre-wrap}
.ai-a a{color:var(--teal)}
.typing{display:flex;gap:4px;padding:8px 13px;align-self:flex-start;background:var(--bg3);border:1px solid var(--bdr);border-radius:10px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--purple);animation:db 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes db{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cday{min-height:48px;border-radius:6px;padding:4px 5px;border:1px solid #0e0e1e;transition:transform .1s}
.cday.hev{cursor:pointer}.cday.hev:hover{transform:scale(1.05);z-index:2}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:#08081a;border:1px solid var(--bdr);border-radius:12px;padding:22px;max-width:600px;width:92%;max-height:88vh;overflow-y:auto}
.ec{padding:4px 6px;border-radius:4px;border:1px solid transparent;background:transparent;font-family:'DM Mono',monospace;font-size:11px;color:var(--tx);width:100%;transition:all .13s}
.ec:focus{border-color:var(--gd);background:var(--bg);outline:none}
select.ec option{background:var(--bg2)}
.camp-hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);margin-bottom:8px;cursor:pointer}
.camp-hdr:hover{opacity:.8}
.pg{animation:pgIn .2s ease}
.drive-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:10px 14px;margin-top:14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;position:sticky;bottom:10px;z-index:20;backdrop-filter:blur(8px)}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes fadeInUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}
.codeblock{background:#05050f;border:1px solid var(--bdr);border-radius:7px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:9px;color:#a8f0c8;line-height:1.9;overflow-x:auto;white-space:pre}
/* Jessi session sidebar */
.jessi-shell{display:flex;gap:0;height:calc(100vh - 200px);min-height:400px}
.jessi-hist{width:190px;flex-shrink:0;border:1px solid var(--bdr);border-right:none;border-radius:9px 0 0 9px;background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
.jessi-chat{flex:1;display:flex;flex-direction:column;border:1px solid var(--bdr);border-radius:0 9px 9px 0;background:var(--card);overflow:hidden}
.jss-item{padding:9px 11px;border-bottom:1px solid var(--bdr);cursor:pointer;transition:background .1s}
.jss-item:hover{background:#c8a96e08}
.jss-item.on{background:#c8a96e0d;border-left:2px solid var(--gold)}
.jss-title{font-size:10px;color:var(--tx);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.jss-meta{font-size:9px;color:var(--tx3)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="logo-l"><span class="logo-ak">AK</span><span class="logo-nm">Artist <span>Intelligence</span></span></div>
    <div class="htabs" id="htabs"></div>
    <div class="hdr-r">Wirehouse Media</div>
  </div>
  <div class="body">
    <div class="sidebar" id="sidebar"><div class="sb-bottom"><button id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode">☀️</button></div></div><button class="sb-toggle" id="sb-toggle" onclick="toggleSidebar()" title="Collapse navigation">◀</button>
    <div class="main" id="main"></div>
  </div>
</div>
<div id="mroot"></div>
<script>
const API="https://ak-intelligence-backend.onrender.com";
const AK_SP_ID="3DiDSECUqqY1AuBP8qtaIa";

async function apicall(path,opts={}){
  const r=await fetch(API+path,{headers:{"Content-Type":"application/json",...(opts.headers||{})},...opts});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.substring(0,200)}`);}
  return r.json();
}
const AT={
  list:(t,f)=>apicall(`/airtable/${encodeURIComponent(t)}${f?`?filterByFormula=${encodeURIComponent(f)}`:""}`).then(d=>d.records||[]),
  create:(t,fields)=>apicall(`/airtable/${encodeURIComponent(t)}`,{method:"POST",body:JSON.stringify(fields)}),
  update:(t,id,fields)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"PATCH",body:JSON.stringify(fields)}),
  del:(t,id)=>apicall(`/airtable/${encodeURIComponent(t)}/${id}`,{method:"DELETE"}),
};
const enc=encodeURIComponent;
const G="#c8a96e",Tl="#69C9D0",Rd="#E1306C",Gr="#1DB954";
const ST={contracted:"#a8f0c8",approved:"#a8f0c8",active:"#a8f0c8","draft review":"#c8a96e",negotiating:"#f0e68c","outreach sent":"#69C9D0",draft:"#888",evaluating:"#f0e68c",pending:"#f0e68c"};
const TC={owned:"#c8a96e",influencer:"#69C9D0",dsp:"#1DB954",pr:"#E1306C",paid:"#9b59b6",report:"#888"};
const PC={News:"#c8a96e",TikTok:"#69C9D0",Reddit:"#FF4500",Blogs:"#a8f0c8",LinkedIn:"#1877F2",YouTube:"#FF0000",Instagram:"#E1306C",Quora:"#A82400"};
const fmt=n=>{if(!n&&n!==0)return"–";n=parseInt(n);return n>=1e9?(n/1e9).toFixed(1)+"B":n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?Math.round(n/1e3)+"K":String(n)};

// ═══ DATA INPUT SECTION — universal component for all tabs ═══
// Each tab gets this at the bottom: text, file upload, screenshot, voice, Jessi data
window._dataSections = JSON.parse(localStorage.getItem('wm_data_sections')||'{}');
window._dataImgs = {};

function buildDataInputSection(tabId, tabName){
  const sections = (window._dataSections[tabId]||[]);
  const sHtml = sections.length ? sections.map((s,i)=>buildDataSectionCard(s,tabId,i)).join("") : 
    `<div style="font-size:10px;color:var(--tx3);padding:14px;text-align:center;line-height:2">No sections yet — add data below</div>`;
  return `
<div style="margin-top:22px;border-top:1px solid var(--bdr);padding-top:18px" id="data-section-wrap-${tabId}">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <div style="font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--purple)">+ Data Sections</div>
      <div style="font-size:9px;color:var(--tx3);margin-top:2px">Add data from Hey Jessi, text, screenshots, files, or voice — auto-generates a themed section</div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btno bsm" style="font-size:9px" onclick="openDataInput('${tabId}','${tabName}')">+ Add Section</button>
      <select class="inp" style="font-size:9px;height:28px;padding:2px 8px" onchange="importDataFromTab(this.value,'${tabId}')" title="Import a section from another tab">
        <option value="">⊕ Import from tab…</option>
        ${["overview","platforms","dsp","catalogue","campaignreport","viral","listening","ai","campaigns","crm","budget","calendar","drafts"].map(t=>`<option value="${t}">${t}</option>`).join("")}
      </select>
    </div>
  </div>
  <div id="data-sections-${tabId}">${sHtml}</div>
</div>`;
}

function buildDataSectionCard(s, tabId, idx){
  const colors = {"text":"var(--purple)","jessi":"var(--gold)","screenshot":"#69C9D0","file":"#1DB954","voice":"#E1306C","imported":"#9b59b6"};
  const icons = {"text":"✏️","jessi":"✦","screenshot":"📷","file":"📄","voice":"🎙","imported":"⊕"};
  const c = colors[s.type]||"var(--purple)";
  const ico = icons[s.type]||"◈";
  return `
<div id="ds-${tabId}-${idx}" style="background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid ${c};border-radius:10px;padding:13px 15px;margin-bottom:9px;position:relative">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span style="font-size:13px">${ico}</span>
    <input value="${s.title||"Section"}" onchange="updateDataSection('${tabId}',${idx},'title',this.value)"
      style="background:none;border:none;border-bottom:1px solid ${c}33;color:${c};font-family:'Syne',sans-serif;font-weight:700;font-size:11px;flex:1;outline:none;padding:2px 0">
    <span style="font-size:9px;color:var(--tx3)">${s.date||""}</span>
    <button onclick="moveDataSection('${tabId}',${idx},-1)" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;padding:0 3px" title="Move up">↑</button>
    <button onclick="moveDataSection('${tabId}',${idx},1)" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;padding:0 3px" title="Move down">↓</button>
    <button onclick="deleteDataSection('${tabId}',${idx})" style="background:none;border:none;color:#f09a9a;cursor:pointer;font-size:16px;padding:0;line-height:1">×</button>
  </div>
  ${s.img ? `<img src="${s.img}" style="max-height:120px;border-radius:7px;border:1px solid var(--bdr);object-fit:cover;margin-bottom:8px;cursor:pointer" onclick="window.open(this.src)" onerror="this.style.display='none'">` : ""}
  <textarea onchange="updateDataSection('${tabId}',${idx},'text',this.value)"
    style="width:100%;min-height:50px;background:var(--bg2);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;font-size:10px;color:var(--tx);font-family:'DM Mono',monospace;resize:vertical;line-height:1.8;box-sizing:border-box;outline:none"
  >${(s.text||"").replace(/</g,"&lt;")}</textarea>
  <div style="display:flex;gap:5px;margin-top:6px;flex-wrap:wrap">
    <button onclick="sendSectionToJessi('${tabId}',${idx})" class="btno bsm" style="font-size:8px">✦ Send to Jessi</button>
    <button onclick="sendSectionToDrive('${tabId}',${idx})" class="btno bsm" style="font-size:8px">📄 To Doc</button>
    <button onclick="copySection('${tabId}',${idx})" class="btno bsm" style="font-size:8px">📋 Copy</button>
  </div>

window._voiceRec = null;
window._voiceChunks = [];
window.toggleVoiceRec = async(tabId)=>{
  const btn = document.getElementById("voice-rec-btn");
  const status = document.getElementById("voice-status");
  if(!window._voiceRec){
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      window._voiceRec = new MediaRecorder(stream);
      window._voiceChunks = [];
      window._voiceRec.ondataavailable = e=>window._voiceChunks.push(e.data);
      window._voiceRec.onstop = ()=>{
        const blob = new Blob(window._voiceChunks,{type:"audio/webm"});
        const url = URL.createObjectURL(blob);
        const ta = document.getElementById("ds-text");
        if(ta) ta.value = "[Voice recording attached — "+Math.round(blob.size/1024)+"KB — send to Jessi to transcribe]";
        stream.getTracks().forEach(t=>t.stop());
        if(btn){btn.textContent="🔴 Start Recording";btn.style.background="";}
        if(status) status.textContent="Recording saved";
      };
      window._voiceRec.start();
      if(btn){btn.textContent="⏹ Stop";btn.style.background="#E1306C";}
      if(status) status.textContent="Recording… click to stop";
    }catch(e){if(status)status.textContent="Mic access needed";}
  } else {
    window._voiceRec.stop(); window._voiceRec=null;
  }
};

window.handleDataImgUpload = (input, tabId)=>{
  if(!window._dataImgs[tabId]) window._dataImgs[tabId]=[];
  const prev = document.getElementById("ds-img-prev");
  Array.from(input.files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      window._dataImgs[tabId].push(e.target.result);
      if(prev){const d=document.createElement("div");d.innerHTML=`<img src="${e.target.result}" style="height:65px;border-radius:6px;border:1px solid var(--bdr);object-fit:cover">`;prev.appendChild(d);}
    };

  });

};

window.saveDataSection = (tabId, type, withJessi=false)=>{
  const title = document.getElementById("ds-title")?.value?.trim()||"Section";

  const entry = {id:Date.now(),type,title,text,img:imgs[0]||null,date:new Date().toLocaleDateString(),tabId};

};

window.fetchShazamData=async(trackId,name)=>{
  const el=document.getElementById("shazam-result");
  if(!el)return;
  el.style.display="block";
  el.innerHTML=`<div class="loading">Loading Shazam data for ${name}…</div>`;
  try{
    const r=await fetch("/api/shazam-total?trackId="+trackId);
    const d=await r.json();
    const count=d?.result?.count||d?.count||d?.total||null;
    el.innerHTML=`<div class="cl" style="margin-bottom:8px">📊 Shazam Data — ${name}</div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <div class="kpi" style="flex:1;min-width:150px">
        <div class="kl">Total Shazams</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;color:#0066ff">${count!=null?Number(count).toLocaleString():"–"}</div>
      </div>
      <div style="font-size:10px;color:var(--tx2);line-height:1.9;flex:2">
        Shazams indicate <strong>discovery intent</strong> — people heard this song somewhere and wanted to know what it was.<br>
        High Shazam counts = strong sync placement, radio, or viral sound moment.
      </div>
    </div>`;
  }catch(e){el.innerHTML=`<div class="err">Shazam error: ${e.message} — check RAPID_KEY in Render</div>`;}
};

function jessiSaveSession(){
  if(!aiHist.length||!jessiCurrentSessionId)return;
  const title=aiHist.find(m=>m.role==="user")?.content?.substring(0,52)||"Session";
  const mode=jessiMode;
  const idx=jessiSessions.findIndex(s=>s.id===jessiCurrentSessionId);
  const s={id:jessiCurrentSessionId,title,mode,ts:new Date().toLocaleString(),messages:[...aiHist]};
  if(idx>=0)jessiSessions[idx]=s;else jessiSessions.unshift(s);
  jessiSessions=jessiSessions.slice(0,30);
  localStorage.setItem("wm_jessi_sessions",JSON.stringify(jessiSessions));

function jessiLoadSession(id){
  const s=jessiSessions.find(x=>x.id===id);if(!s)return;
  jessiCurrentSessionId=s.id;
  aiHist.length=0;s.messages.forEach(m=>aiHist.push(m));
  if(s.mode&&s.mode!==jessiMode){jessiMode=s.mode;setJessiMode(s.mode,true);}

  renderJessiSessions();
}
function jessiDeleteSession(id,e){
  e.stopPropagation();
  if(!confirm("Delete this session?"))return;
  jessiSessions=jessiSessions.filter(s=>s.id!==id);
  localStorage.setItem("wm_jessi_sessions",JSON.stringify(jessiSessions));
  if(jessiCurrentSessionId===id){aiHist.length=0;jessiCurrentSessionId=null;const el=document.getElementById("ai-msgs");if(el)el.innerHTML="";}
  renderJessiSessions();
}

window.handleJessiImage = (input) => {

  const att = document.getElementById('jessi-attachments');
  if(att) {att.style.display='flex';}
  Array.from(files).forEach(file => {

    reader.onload = (e) => {

      jessiImages.push({type: file.type, data: b64, name: file.name});
      if(att) {
        const thumb = document.createElement('div');
        thumb.style.cssText = 'position:relative;display:inline-block';

window.removeJessiImg = (btn) => {

window.handleJessiVoice = (input) => {
  const file = input.files[0];
  if(!file) return;
  showGDriveToast('🎙 Voice note added — Jessi will transcribe and respond to it');
  const reader = new FileReader();
  reader.onload = (e) => {
    jessiVoiceText = '[Voice note uploaded: '+file.name+' ('+Math.round(file.size/1024)+'KB) — please transcribe and respond to the audio content]';
    const inp = document.getElementById('ai-inp');
    if(inp && !inp.value) inp.value = jessiVoiceText;
    const att = document.getElementById('jessi-attachments');
    if(att) {

    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
};

window.toggleRecording = async () => {
  const btn = document.getElementById('record-btn');
  if(!isRecording) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRecorder = new MediaRecorder(stream);
      recordingChunks = [];
      mediaRecorder.ondataavailable = e => recordingChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(recordingChunks, {type:'audio/webm'});
        const url = URL.createObjectURL(blob);
        const inp = document.getElementById('ai-inp');
        if(inp) inp.value = '[Voice recording attached — please respond to what was said]';
        const att = document.getElementById('jessi-attachments');
        if(att) {
          att.style.display = 'flex';
          att.innerHTML += '<audio controls src="'+url+'" style="height:32px;border-radius:6px"></audio>';
        }
        stream.getTracks().forEach(t=>t.stop());
        showGDriveToast('🎙 Recording complete — send your message to Jessi');
      };
      mediaRecorder.start();
      isRecording = true;
      if(btn) {btn.textContent='⏹ Stop';btn.style.color='#f09a9a';btn.style.borderColor='#f09a9a33';}
    } catch(e) {
      showGDriveToast('Microphone access needed — allow in browser settings');
    }
  } else {
    if(mediaRecorder) mediaRecorder.stop();
    isRecording = false;
    if(btn) {btn.textContent='🔴 Record';btn.style.color='';btn.style.borderColor='';}
  }
};

// ── Override aiSend to include images + data ──
async function aiSend(){
  const inp = document.getElementById('ai-inp');
  const q = inp?.value?.trim();
  if(!q && !jessiImages.length && !jessiVoiceText) return;
  if(inp) inp.value = '';

  // Include any pasted Sony/Luminate data
  const dataEl = document.getElementById('luminate-data');
  const extraData = dataEl?.value?.trim() || '';

  const msgs = document.getElementById('ai-msgs');
  const typing = document.getElementById('ai-typing');
  if(!msgs) return;

  const userText = q || '(Voice/image message)';
  msgs.innerHTML += '<div class="ai-u">'+userText+(extraData?'\n\n[Data attached]':'')+(jessiImages.length?'\n\n['+jessiImages.length+' image(s) attached]':'')+'</div>';
  if(typing) typing.style.display = 'flex';
  msgs.scrollTop = msgs.scrollHeight;

  // Build message with context
  let fullMsg = userText;
  if(extraData) fullMsg += '\n\nDATA PROVIDED (Sony DSRP / Luminate / other):\n'+extraData;
  if(jessiImages.length) fullMsg += '\n\n['+jessiImages.length+' screenshot(s) provided by user — describe what you see and incorporate into your response]';

  fullMsg += buildJessiContext();

  try {
    // Build messages array with images if any
    let messageContent;
    if(jessiImages.length) {
      messageContent = [
        ...jessiImages.map(img => ({type:'image',source:{type:'base64',media_type:img.type,data:img.data.split(',')[1]}})),
        {type:'text',text:fullMsg}
      ];
    } else {
      messageContent = fullMsg;
    }

    aiHist.push({role:'user', content: userText});
    const d = await apicall('/ai/chat', {method:'POST', body:JSON.stringify({
      messages:[...aiHist.slice(0,-1), {role:'user', content:messageContent}]
    })});
    aiHist.push({role:'assistant', content:d.reply});

    if(typing) typing.style.display = 'none';
    const fmt2 = d.reply
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1 ↗</a>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong style="color:var(--gold)">$1</strong>')
      .replace(/^#{1,3} (.+)$/gm,'<div style="font-family:Playfair Display,serif;font-size:14px;color:var(--gold);margin:10px 0 4px">$1</div>')
      .replace(/\n/g,'<br>');

    const actBtns='<div style="display:flex;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid var(--bdr);flex-wrap:wrap">'+
      '<button onclick="copyAIResponse(this)" class="btno bsm">&#128203; Copy</button>'+
      '<button onclick="saveAsDoc(this)" class="btno bsm">&#128190; Draft</button>'+
      '<button data-fn="exportJessiToDrive(\"doc\")" class="drive-btn-doc btno bsm" style="color:#4285F4;border-color:#4285F422">&#128196; Doc</button>'+
      '<button data-fn="exportJessiToDrive(\"sheet\")" class="drive-btn-doc btno bsm" style="color:#0F9D58;border-color:#0F9D5822">&#128202; Sheet</button>'+
      '<button onclick="go(\"drafts\")" class="btno bsm">&#8594; Drafts</button>'+
      '</div>';
    msgs.innerHTML += '<div class="ai-a">'+fmt2+actBtns+'</div>';

    // Clear images after sending
    jessiImages = [];
    jessiVoiceText = '';
    const att = document.getElementById('jessi-attachments');
    if(att){att.innerHTML='';att.style.display='none';}

    jessiSaveSession();
  } catch(e) {
    if(typing) typing.style.display = 'none';
    msgs.innerHTML += '<div class="ai-a" style="color:#f09a9a">Hey Jessi error: '+e.message+'<br><br>Check ANTHROPIC_API_KEY in Render env vars.</div>';
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function budgetRow(l){
  const rem=l.total-l.spent;
  const stOpts=["paid","active","negotiating","outreach sent","draft review","pending","cancelled"].map(s=>`<option value="${s}" ${l.st===s?"selected":""}>${s}</option>`).join("");
  const crmLink=l.crmId?`<button class="btno bsm" onclick="go('crm')" style="font-size:8px">→ CRM</button>`:"-";
  return`<tr id="br-${l.id}">
    <td><input class="ec" id="bn-${l.id}" value="${l.name}" style="min-width:120px"></td>
    <td><input class="ec" id="bpl-${l.id}" value="${l.platform}" style="min-width:55px"></td>
    <td><input class="ec" id="bt-${l.id}" value="${l.total}" style="min-width:60px;text-align:right;color:#c8a96e" oninput="refreshBudgetSummary()" type="number"></td>
    <td><input class="ec" id="bs-${l.id}" value="${l.spent}" style="min-width:60px;text-align:right;color:#a8f0c8" oninput="refreshBudgetSummary()" type="number"></td>
    <td style="font-family:'Playfair Display',serif;font-size:14px;color:${rem>=0?"var(--tx2)":"#f09a9a"}">$${rem.toLocaleString()}</td>
    <td><select class="ec" id="bst-${l.id}" style="min-width:90px;color:${B_ST_C[l.st]||"#888"}">${stOpts}</select></td>
    <td><input class="ec" id="bag-${l.id}" value="${l.agent}" placeholder="Agent name" style="min-width:90px"></td>
    <td><input class="ec" id="bae-${l.id}" value="${l.agentEmail}" placeholder="agent@email.com" style="min-width:110px"></td>
    <td><input class="ec" id="bta-${l.id}" value="${l.turnAround}" style="min-width:55px"></td>
    <td><input class="ec" id="bno-${l.id}" value="${l.notes}" style="min-width:120px"></td>
    <td>${crmLink}</td>
    <td><button class="btn bsm" onclick="saveBudgetLine('${l.id}')">Save</button></td>
  </tr>`;
}
window.saveBudgetLine=async id=>{
  const l=budgetData.lines.find(x=>x.id===id);if(!l)return;
  l.name=document.getElementById(`bn-${id}`)?.value||l.name;
  l.platform=document.getElementById(`bpl-${id}`)?.value||l.platform;
  l.total=parseFloat(document.getElementById(`bt-${id}`)?.value)||l.total;
  l.spent=parseFloat(document.getElementById(`bs-${id}`)?.value)||l.spent;
  l.st=document.getElementById(`bst-${id}`)?.value||l.st;
  l.agent=document.getElementById(`bag-${id}`)?.value||"";
  l.agentEmail=document.getElementById(`bae-${id}`)?.value||"";
  l.turnAround=document.getElementById(`bta-${id}`)?.value||l.turnAround;
  l.notes=document.getElementById(`bno-${id}`)?.value||"";
  const btn=document.querySelector(`#br-${id} .btn`);
  if(btn){btn.textContent="Saving…";btn.disabled=true;}
  try{
    if(!id.startsWith("local"))await AT.update("Budget",id,{Name:l.name,Campaign:l.camp,Platform:l.platform,Budget:l.total,Spent:l.spent,Status:l.st,Agent:l.agent,AgentEmail:l.agentEmail,Notes:l.notes});
    if(btn){btn.textContent="✓ Saved";btn.style.background="#a8f0c8";btn.style.color="#000";}
    setTimeout(()=>{if(btn){btn.textContent="Save";btn.style.background="";btn.style.color="";btn.disabled=false;}},2000);
    refreshBudgetSummary();
  }catch(e){if(btn){btn.textContent="Retry";btn.disabled=false;}}
};
window.addBudgetLine=(camp)=>{
  const id="local-"+Date.now();
  budgetData.lines.push({id,name:"New Line",camp:camp||"April Campaign",cat:"influencer",platform:"TikTok",total:0,spent:0,st:"outreach sent",agent:"",agentEmail:"",turnAround:"5 days",notes:"",crmId:""});
  renderPage();setTimeout(()=>{document.getElementById(`bn-${id}`)?.focus();},100);
};
window.refreshBudgetSummary=()=>{budgetData.lines.forEach(l=>{const t=document.getElementById(`bt-${l.id}`);const s=document.getElementById(`bs-${l.id}`);if(t)l.total=parseFloat(t.value)||0;if(s)l.spent=parseFloat(s.value)||0;});};
window.exportBudget=()=>{
  const csv=[["Name","Campaign","Category","Platform","Budget","Spent","Remaining","Status","Agent","Agent Email","Turnaround","Notes"],...budgetData.lines.map(l=>[l.name,l.camp,l.cat,l.platform,l.total,l.spent,l.total-l.spent,l.st,l.agent,l.agentEmail,l.turnAround,l.notes])].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="ak_budget.csv";a.click();
};

window.addCampDashUpload=(input)=>{
  const files=Array.from(input.files||[]);
  const preview=document.getElementById('cr-uploads-preview');
  files.forEach(file=>{
    const entry={name:file.name,type:file.type,size:file.size};
    crUploads.push(entry);
    if(file.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=e=>{
        entry.dataUrl=e.target.result;
        if(preview){
          const d=document.createElement('div');
          d.style.cssText='position:relative;display:inline-block';
          d.innerHTML='<img src="'+e.target.result+'" style="height:65px;border-radius:6px;border:1px solid var(--bdr);object-fit:cover">'+
            '<div style="font-size:8px;color:var(--tx2);text-align:center;margin-top:2px">'+file.name.substring(0,16)+'</div>';
          preview.appendChild(d);
        }
      };
      r.readAsDataURL(file);
    } else {
      if(preview){
        const d=document.createElement('div');
        d.style.cssText='padding:6px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;font-size:9px;color:var(--tx2)';
        d.textContent='📄 '+file.name;
        preview.appendChild(d);
      }
    }
  });
  input.value='';
};

window.sendDashToJessi=()=>{
  const paste=document.getElementById('cr-data-paste')?.value?.trim()||'';
  const ctx=buildFullCampaignContext();
  const imgs=crUploads.filter(u=>u.dataUrl);
  if(imgs.length) jessiImages=imgs.map(u=>({type:'image/jpeg',data:u.dataUrl,name:u.name}));
  go('ai');
  setTimeout(()=>{
    if(typeof setJessiMode==='function')setJessiMode('coverage');
    const inp=document.getElementById('ai-inp');
    if(inp)inp.value='Analyze all of this campaign dashboard data and generate a full coverage report:\n\n'+ctx+(paste?'\n\nADDITIONAL DATA:\n'+paste:'')+(imgs.length?'\n\n['+imgs.length+' screenshot(s) attached]':'');
    setTimeout(aiSend,100);
  },300);
};

window.switchCampaignReport=(campId)=>{
  const el=document.getElementById('camp-report-content');
  const sel=document.getElementById('camp-report-select');
  if(sel)sel.value=campId;
  if(!el)return;
  const totalSpent=budgetData?budgetData.lines.reduce((a,b)=>a+b.spent,0):17100;
  el.innerHTML=campId==='all'?buildAllCampsView(totalSpent):buildSingleCampView(campId);
};

window.downloadNoWatermark=async()=>{
  const urlEl=document.getElementById("nwm-url");
  const url=urlEl?.value?.trim()||"";
  const el=document.getElementById("nwm-result");
  if(!url||!el)return;
  el.innerHTML=`<div class="loading">Fetching no-watermark link…</div>`;
  // Extract video ID
  const vid=url.match(/video\/([\d]{10,25})/)?.[1]||url.match(/\/([\d]{15,25})$/)?.[1]||url.replace(/\D/g,"").slice(0,19);
  if(!vid){el.innerHTML=`<div class="err">Could not extract video ID from URL</div>`;return;}
  try{
    const r=await fetch("/api/tt-no-watermark?aweme_id="+vid);
    const d=await r.json();
    const videoUrl=d?.aweme_detail?.video?.play_addr?.url_list?.[0]
      ||d?.data?.play||d?.video_url||d?.url||null;
    if(videoUrl){
      el.innerHTML=`<div style="padding:12px;background:var(--bg3);border:1px solid #69C9D033;border-radius:9px">
        <div style="font-size:11px;color:#69C9D0;font-weight:700;margin-bottom:8px">✅ No-watermark video ready</div>
        <div style="font-size:10px;color:var(--tx2);margin-bottom:8px;word-break:break-all">${videoUrl.substring(0,80)}…</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <a href="${videoUrl}" target="_blank" class="btn bsm" style="text-decoration:none">▶ Play Video ↗</a>
          <a href="${videoUrl}" download class="btno bsm" style="text-decoration:none">⬇️ Download</a>
          <button onclick="navigator.clipboard?.writeText('${videoUrl}');this.textContent='✓ Copied'" class="btno bsm">📋 Copy URL</button>
        </div>
        <div style="font-size:9px;color:var(--tx3);margin-top:7px">For internal use only · Do not redistribute</div>
      </div>`;
    }else{
      el.innerHTML=`<div class="err">No download URL found in response. The video may be private, deleted, or the API rate limit was hit.<br><small>${JSON.stringify(d).substring(0,200)}</small></div>`;
    }
  }catch(e){el.innerHTML=`<div class="err">Error: ${e.message} — check RAPID_KEY in Render</div>`;}
};

const crUploads=[];
window.addCampDashUpload=(input)=>{
  const files=Array.from(input.files||[]);
  const preview=document.getElementById('cr-uploads-preview');
  files.forEach(file=>{
    const entry={name:file.name,type:file.type,size:file.size};
    crUploads.push(entry);
    if(file.type.startsWith('image/')){
      const r=new FileReader();
      r.onload=e=>{
        entry.dataUrl=e.target.result;
        if(preview){
          const d=document.createElement('div');
          d.style.cssText='position:relative;display:inline-block';
          d.innerHTML='<img src="'+e.target.result+'" style="height:65px;border-radius:6px;border:1px solid var(--bdr);object-fit:cover">'+
            '<div style="font-size:8px;color:var(--tx2);text-align:center;margin-top:2px">'+file.name.substring(0,16)+'</div>';
          preview.appendChild(d);
        }
      };
      r.readAsDataURL(file);
    } else {
      if(preview){
        const d=document.createElement('div');
        d.style.cssText='padding:6px 10px;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;font-size:9px;color:var(--tx2)';
        d.textContent='📄 '+file.name;
        preview.appendChild(d);
      }
    }
  });
  input.value='';
};

window.sendDashToJessi=()=>{
  const paste=document.getElementById('cr-data-paste')?.value?.trim()||'';
  const ctx=buildFullCampaignContext();
  const imgs=crUploads.filter(u=>u.dataUrl);
  if(imgs.length) jessiImages=imgs.map(u=>({type:'image/jpeg',data:u.dataUrl,name:u.name}));
  go('ai');
  setTimeout(()=>{

    const inp=document.getElementById('ai-inp');

};

function gDocUrl(title, body){
  // Google Docs new doc with title — content pasted after open
  return `https://docs.google.com/document/create?title=${encodeURIComponent(title)}`;

function gSheetUrl(title){
  return `https://docs.google.com/spreadsheets/create?title=${encodeURIComponent(title)}`;

// Open a new Google Doc and copy content to clipboard so user can paste
window.saveToGoogleDoc=(title, body)=> {
  const text = typeof body === 'string' ? body : JSON.stringify(body, null, 2);
  // Copy to clipboard using both methods
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  } catch(e) {
    navigator.clipboard?.writeText(text);
  }
  showGDriveToast('📄 Copied! Google Doc opening → paste with Cmd+V / Ctrl+V to save.');
  window.open('https://docs.google.com/document/create?title='+encodeURIComponent(title), '_blank');
};

window.saveToGoogleSheet=(title, rows) => {
  // TSV format for Google Sheets paste
  const tsv = (rows||[]).map(r=>(r||[]).map(c=>String(c||'').replace(/\t/g,' ')).join('\t')).join('\n');
  try {
    const ta = document.createElement('textarea');
    ta.value = tsv;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  } catch(e) {
    navigator.clipboard?.writeText(tsv);
  }
  showGDriveToast('📊 Copied as spreadsheet! Google Sheet opening → paste with Cmd+V / Ctrl+V, then Save to Drive.');
  window.open('https://docs.google.com/spreadsheets/create?title='+encodeURIComponent(title), '_blank');
};

window.showGDriveToast=(msg)=>{
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#a07fd4;color:#fff;padding:10px 18px;border-radius:8px;font-size:11px;font-family:Syne,sans-serif;font-weight:700;z-index:9999;max-width:380px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:fadeInUp .3s ease';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 5000);
};

function _ensureHdrToggle(){
  var hdr = document.querySelector('.hdr');

  if(!logo) return;
  if(!existing){

      localStorage.setItem('wm_sb_col', col?'1':'0');

<script>
(function(){
'use strict';

// ═══════════════════════════════════════
// 1. 7-DAY PERSISTENCE — stamp + prune
// ═══════════════════════════════════════
var D7 = 7 * 24 * 60 * 60 * 1000;
function stamp(e){ if(!e.ts) e.ts = Date.now(); return e; }
function fresh(e){ return !e.ts || Date.now()-e.ts < D7; }
function pruneArr(arr, key){
  var f = arr.filter(fresh);
  if(f.length !== arr.length){
    arr.splice(0,arr.length); f.forEach(function(x){arr.push(x);});
    try{ localStorage.setItem(key, JSON.stringify(arr)); }catch(e){}
  }
}

// ── Sony data (re-load + prune) ──
window.sonyData = JSON.parse(localStorage.getItem('wm_sony_data')||'[]').map(stamp);
pruneArr(window.sonyData, 'wm_sony_data');
window._sonyImgs = [];

// ── CR sections ──
window.crSections = JSON.parse(localStorage.getItem('wm_cr_secs')||'[]').map(stamp);
pruneArr(window.crSections, 'wm_cr_secs');

// ── DSP sections ──
window.dspSections = JSON.parse(localStorage.getItem('wm_dsp_secs')||'[]').map(stamp);
pruneArr(window.dspSections, 'wm_dsp_secs');

function saveSONY(){ try{localStorage.setItem('wm_sony_data', JSON.stringify(window.sonyData));}catch(e){} }
function saveCR(){   try{localStorage.setItem('wm_cr_secs',   JSON.stringify(window.crSections));}catch(e){} }
function saveDSP(){  try{localStorage.setItem('wm_dsp_secs',  JSON.stringify(window.dspSections));}catch(e){} }

// ═══════════════════════════════════════
// 2. FIX buildDriveBar — onclick instead of data-fn+eval (quotes survive HTML parser)
// ═══════════════════════════════════════
window.buildDriveBar = function(pageId){
  function dBtn(lbl,fn){
    return '<button onclick="'+fn+'" style="padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;font-family:Syne,sans-serif;cursor:pointer;border:1px solid #4285F433;background:none;color:#4285F4;letter-spacing:.06em;text-transform:uppercase">&#128196; '+lbl+'</button>';
  }
  function sBtn(lbl,fn){
    return '<button onclick="'+fn+'" style="padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;font-family:Syne,sans-serif;cursor:pointer;border:1px solid #0F9D5833;background:none;color:#0F9D58;letter-spacing:.06em;text-transform:uppercase">&#128202; '+lbl+'</button>';
  }
  var btns={
    overview:   dBtn('Save Overview',  "exportPageToDrive(&quot;overview&quot;)")        +sBtn('Stats Sheet',      "exportPageToDrive(&quot;overview&quot;,&quot;sheet&quot;)"),
    platforms:  dBtn('Platforms Doc',  "exportPageToDrive(&quot;platforms&quot;)")       +sBtn('Platforms Sheet',  "exportPageToDrive(&quot;platforms&quot;,&quot;sheet&quot;)"),
    dsp:        dBtn('DSP Report',     "exportPageToDrive(&quot;dsp&quot;)")             +sBtn('DSP Sheet',        "exportPageToDrive(&quot;dsp&quot;,&quot;sheet&quot;)"),
    catalogue:  sBtn('Catalogue Sheet',"exportPageToDrive(&quot;catalogue&quot;,&quot;sheet&quot;)") +dBtn('Catalogue Doc',"exportPageToDrive(&quot;catalogue&quot;)"),
    chartex:    dBtn('ChartEx Session',"exportPageToDrive(&quot;chartex&quot;)"),
    campaignreport: dBtn('Campaign Report Doc',"exportPageToDrive(&quot;campaignreport&quot;)") +sBtn('Report Sheet',"exportPageToDrive(&quot;campaignreport&quot;,&quot;sheet&quot;)"),
    viral:      dBtn('Viral Formulas', "exportPageToDrive(&quot;viral&quot;)"),
    listening:  dBtn('Listening Report',"exportPageToDrive(&quot;listening&quot;)"),
    ai:         dBtn('Jessi Chat Doc', "exportJessiToDrive(&quot;doc&quot;)")             +sBtn('Chat to Sheet',   "exportJessiToDrive(&quot;sheet&quot;)"),
    campaigns:  dBtn('Campaigns Doc',  "exportAllCampaignsToDrive(&quot;doc&quot;)")     +sBtn('Campaigns Sheet', "exportAllCampaignsToDrive()"),
    crm:        sBtn('CRM Sheet',      "exportCRMToDrive()")                              +dBtn('CRM Report Doc',  "exportCRMReportToDrive()"),
    budget:     sBtn('Budget Sheet',   "exportBudgetToDrive()")                           +dBtn('Budget Report',   "exportPageToDrive(&quot;budget&quot;)"),
    calendar:   dBtn('Calendar Doc',   "exportPageToDrive(&quot;calendar&quot;)")         +sBtn('Events Sheet',    "exportCalendarToDrive()"),
    drafts:     dBtn('All Drafts Doc', "exportAllDraftsToDrive()"),
    contracts:  sBtn('Contracts Sheet',"exportContractsToDrive()")                        +dBtn('Contracts Doc',   "exportPageToDrive(&quot;contracts&quot;)"),
    partners:   dBtn('Partners Doc',   "exportPageToDrive(&quot;partners&quot;)")         +sBtn('Airtable Sheet',  "exportAirtableToDrive(&quot;Creators&quot;)"),
  };
  var b = btns[pageId] || dBtn('Save This Page', "exportPageToDrive(&quot;"+pageId+"&quot;)");
  var full = '<button onclick="exportPageToDrive(&quot;all&quot;)" style="padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;font-family:Syne,sans-serif;cursor:pointer;border:1px solid #2a1f42;background:none;color:#4a3868;margin-left:auto;letter-spacing:.06em;text-transform:uppercase">&#128193; Full Export</button>';
  return '<div class="drive-bar"><span style="font-size:9px;color:#9080b0;font-family:Syne,sans-serif;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0">&#128190; Google Drive</span>'+b+full+'</div>';
};

// ═══════════════════════════════════════
// 3. DRAG-AND-DROP HELPER
// ═══════════════════════════════════════
function makeDrag(container, arr, saveF, renderF){
  var cards = container.querySelectorAll('.ak-sec');
  var src = null;
  cards.forEach(function(el){
    el.setAttribute('draggable','true');
    el.ondragstart = function(e){ src=el; el.style.opacity='.45'; e.dataTransfer.effectAllowed='move'; };
    el.ondragend   = function(){ el.style.opacity=''; src=null; };
    el.ondragover  = function(e){ e.preventDefault(); el.classList.add('drag-over'); };
    el.ondragleave = function(){ el.classList.remove('drag-over'); };
    el.ondrop      = function(e){
      e.preventDefault(); el.classList.remove('drag-over');
      if(!src||src===el)return;
      var from=parseInt(src.dataset.ri), to=parseInt(el.dataset.ri);
      var len=arr.length;
      // ri is reversed index: ri=0 = arr[len-1]
      var rFrom=len-1-from, rTo=len-1-to;
      var item=arr.splice(rFrom,1)[0]; arr.splice(rTo,0,item);
      saveF(); renderF();
    };
  });
}

// ═══════════════════════════════════════
// 4. SECTION RENDERER — editable, draggable
// ═══════════════════════════════════════
function renderSecArr(containerId, arr, saveF, renderF, extraBtns){
  var el = document.getElementById(containerId); if(!el) return;
  if(!arr.length){
    el.innerHTML = '<div class="ak-sec-empty">No sections yet — paste data above and click Add Section</div>';
    return;
  }
  el.innerHTML = arr.slice().reverse().map(function(e,ri){
    var i = arr.length-1-ri;
    var tEsc = (e.title||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    var bEsc = (e.text||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var arrName = arr === window.crSections ? 'crSections' : 'dspSections';
    var saveCall = arr === window.crSections ? 'saveCR_()' : 'saveDSP_()';
    var renderCall = arr === window.crSections ? 'renderCRSecs()' : 'renderDSPSecs()';
    var extra = extraBtns ? extraBtns(e, i, arrName) : '';
    return '<div class="ak-sec" draggable="true" data-ri="'+ri+'" data-id="'+e.id+'">'+
      '<button class="ak-sdel" onclick="akDelSec(\''+arrName+'\','+i+')">×</button>'+
      '<div class="ak-sec-hdr">'+
        '<span class="ak-drag" title="Drag to reorder">⠿</span>'+
        '<input class="ak-stitle" value="'+tEsc+'" placeholder="Section title"'+
          ' onchange="window.'+arrName+'['+i+'].title=this.value;window.'+saveCall+'">'+
        '<span class="ak-sdate">'+e.date+'</span>'+
      '</div>'+
      '<textarea class="ak-sbody"'+
        ' onchange="window.'+arrName+'['+i+'].text=this.value;window.'+saveCall+'">'+bEsc+'</textarea>'+
      '<div class="ak-sactions">'+
        '<button class="ak-sbtn" onclick="akJessiSec(\''+arrName+'\','+i+')">✦ Jessi</button>'+
        '<button class="ak-sbtn" onclick="akCopySec(\''+arrName+'\','+i+',this)">📋 Copy</button>'+
        extra+
      '</div>'+
    '</div>';
  }).join('');
  makeDrag(el, arr, saveF, renderF);
}

// Expose save functions to string-eval context
window.saveCR_  = function(){ saveCR(); };
window.saveDSP_ = function(){ saveDSP(); };

window.akDelSec = function(arrName, i){
  var arr = arrName==='crSections' ? window.crSections : window.dspSections;
  arr.splice(i,1);
  if(arrName==='crSections'){ saveCR(); window.renderCRSecs(); }
  else { saveDSP(); window.renderDSPSecs(); }
};

window.akCopySec = function(arrName, i, btn){
  var arr = arrName==='crSections' ? window.crSections : window.dspSections;
  var e = arr[i]; if(!e) return;
  var txt = e.title+'\n\n'+e.text;
  if(navigator.clipboard) navigator.clipboard.writeText(txt).catch(function(){});
  if(btn){ btn.textContent='✓ Copied'; setTimeout(function(){ btn.textContent='📋 Copy'; }, 1500); }
};

window.akJessiSec = function(arrName, i){
  var arr = arrName==='crSections' ? window.crSections : window.dspSections;
  var e = arr[i]; if(!e) return;
  if(typeof go==='function') go('ai');
  setTimeout(function(){
    var inp = document.getElementById('ai-inp');
    if(inp) inp.value = 'Analyze this data and give me key insights, trends, and recommended next actions:\n\nTitle: '+e.title+'\n\n'+e.text;
    if(typeof aiSend==='function') setTimeout(aiSend, 100);
  }, 300);
};

// ═══════════════════════════════════════
// 5. CAMPAIGN REPORT SECTIONS
// ═══════════════════════════════════════
window.renderCRSecs = function(){
  renderSecArr('ak-cr-secs', window.crSections, saveCR, window.renderCRSecs,
    function(e, i){ return '<button class="ak-sbtn" onclick="akSendSecToDrive(\'crSections\','+i+')" style="color:#4285F4;border-color:#4285F422">📄 To Doc</button>'; }
  );
};

window.akAddCRSec = function(){
  var ta = document.getElementById('cr-data-paste');
  var ti = document.getElementById('ak-cr-title');
  var text = ta ? ta.value.trim() : '';
  var title = ti ? ti.value.trim() : '';
  if(!text){ if(typeof showGDriveToast==='function') showGDriveToast('Paste data first — then click Add Section'); return; }
  window.crSections.push({ id:Date.now(), ts:Date.now(), title:title||'Data — '+new Date().toLocaleDateString(), text:text, date:new Date().toLocaleString() });
  saveCR();
  if(ta) ta.value=''; if(ti) ti.value='';
  var panel = document.getElementById('cr-upload-panel'); if(panel) panel.style.display='none';
  window.renderCRSecs();
  if(typeof showGDriveToast==='function') showGDriveToast('✓ Section added — drag ⠿ to reorder, click title/text to edit');
};

window.akAddCRAndJessi = function(){
  var ta = document.getElementById('cr-data-paste');
  var ti = document.getElementById('ak-cr-title');
  var text = ta ? ta.value.trim() : '';
  var title = ti ? ti.value.trim() : '';
  if(!text && (!window.crUploads || !window.crUploads.some(function(u){return u.dataUrl;}))){ 
    if(typeof showGDriveToast==='function') showGDriveToast('Paste data or upload a screenshot first'); return; 
  }
  if(text){
    window.crSections.push({ id:Date.now(), ts:Date.now(), title:title||'Jessi Analysis — '+new Date().toLocaleDateString(), text:text, date:new Date().toLocaleString() });
    saveCR(); window.renderCRSecs();
  }
  if(typeof window.sendDashToJessi==='function') window.sendDashToJessi();
  if(typeof showGDriveToast==='function') showGDriveToast('Sending to Jessi — section saved');
};

window.akSendSecToDrive = function(arrName, i){
  var arr = arrName==='crSections' ? window.crSections : window.dspSections;
  var e = arr[i]; if(!e) return;
  if(typeof window.saveToGoogleDoc==='function')
    window.saveToGoogleDoc(e.title+' — '+new Date().toLocaleDateString(), '=== '+e.title+' ===\n'+e.date+'\n\n'+e.text);
};

window.akImportDriveURL = function(){
  var url = prompt('Paste your Google Doc or Sheet URL:');
  if(!url||!url.startsWith('http')) return;
  var type = url.includes('spreadsheets') ? 'Google Sheet' : 'Google Doc';
  window.crSections.push({ id:Date.now(), ts:Date.now(), title:type+' — '+new Date().toLocaleDateString(), text:'Source: '+url+'\n\nOpen: '+url, date:new Date().toLocaleString() });
  saveCR(); window.renderCRSecs();
  if(typeof showGDriveToast==='function') showGDriveToast('Drive link saved — click ✦ Jessi to analyze');
};

// Inject title input + Add/Jessi buttons into cr-upload-panel
function _upgradeCRPanel(){
  var panel = document.getElementById('cr-upload-panel'); if(!panel) return;
  if(panel.querySelector('.ak-cr-injected')) return;
  panel.classList.add('ak-cr-injected');

  // Add title input before textarea
  var ta = document.getElementById('cr-data-paste');
  if(ta){
    var inp = document.createElement('input');
    inp.id = 'ak-cr-title';
    inp.className = 'inp';
    inp.placeholder = 'Section title (e.g. Sony DSRP Apr 5, Con Cora Week 2 Stats)';
    inp.style.cssText = 'width:100%;margin-bottom:7px;font-size:9px';
    ta.parentNode.insertBefore(inp, ta);
  }

  // Add buttons row after textarea
  var preview = document.getElementById('cr-uploads-preview');
  var btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:7px;margin-top:8px;flex-wrap:wrap';
  btnRow.innerHTML =
    '<button onclick="window.akAddCRSec()" class="btn bsm" style="font-size:9px">➕ Add Section</button>'+
    '<button onclick="window.akAddCRAndJessi()" class="btno bsm" style="font-size:9px">✦ Add + Analyze with Jessi</button>'+
    '<button onclick="window.akImportDriveURL()" class="btno bsm" style="font-size:9px">📁 Import Drive URL</button>';
  if(preview) preview.parentNode.insertBefore(btnRow, preview.nextSibling);
  else panel.appendChild(btnRow);

  // Sections container
  var campContent = document.getElementById('camp-report-content');
  var secWrap = document.createElement('div');
  secWrap.id = 'ak-cr-secs-wrap';
  secWrap.innerHTML = '<div class="cl" style="color:var(--purple);margin-top:14px;margin-bottom:3px">📎 Data Sections</div><div id="ak-cr-secs"></div>';
  if(campContent) campContent.before(secWrap);
  else panel.after(secWrap);

  window.renderCRSecs();
}

window.akSaveSonyEntry = function(){

  window.dspSections.push(sec); saveDSP();
  window.crSections.push({ id:Date.now()+1, ts:Date.now(), title:'Sony DSRP: '+entry.label, text:sec.text, date:new Date().toLocaleString() });
  saveCR();
  window.akRenderSonyHL();

  if(document.getElementById('ak-cr-secs')) window.renderCRSecs();

  var d = document.getElementById('ak-sony-date');
  var text  = p ? p.value.trim() : '';
  var label = l ? l.value.trim() : 'Sony data';
  var date  = d ? d.value : new Date().toISOString().split('T')[0];
  if(window._sonyImgs.length && typeof jessiImages!=='undefined')
    window.jessiImages = window._sonyImgs.map(function(dt,i){ return {type:'image/jpeg', data:dt, name:'sony-'+i+'.jpg'}; });
  if(typeof go==='function') go('ai');
  setTimeout(function(){
    var inp = document.getElementById('ai-inp');
    if(inp) inp.value = 'Analyze this Sony DSRP/Luminate data ('+label+', '+date+'):\n\n'+(text||'[See screenshot attached]')+'\n\nGive me: platform-by-platform highlights, week-over-week changes, what is working, what needs attention, and next action steps.';
    if(typeof aiSend==='function') setTimeout(aiSend, 100);
  }, 300);
};

window.akAddSonyScreenshot = function(input){
  Array.from(input.files||[]).forEach(function(file){
    var r = new FileReader(); r.onload = function(e){
      window._sonyImgs.push(e.target.result);
      var prev = document.getElementById('ak-sony-prev');
      if(prev){
        var d = document.createElement('div');
        d.innerHTML = '<img src="'+e.target.result+'" style="height:60px;border-radius:6px;border:1px solid #2a1f42;object-fit:cover;cursor:pointer" onclick="window.open(this.src)">';
        prev.appendChild(d);
      }
      if(typeof showGDriveToast==='function') showGDriveToast('📷 Screenshot ready — click Save Entry or ✦ Analyze with Jessi');
    };
    r.readAsDataURL(file);
  });
  input.value='';
};

window.akRenderSonyHL = function(){
  var el = document.getElementById('ak-sony-entries'); if(!el) return;
  if(!window.sonyData.length){
    el.innerHTML = '<div class="ak-empty-sony">No data yet — paste Sony DSRP numbers or upload a screenshot above.<br>Each entry auto-creates a dashboard section + feeds Campaign Report + Jessi.</div>';
    return;
  }
  el.innerHTML = window.sonyData.slice().reverse().map(function(e,ri){
    var i = window.sonyData.length-1-ri;
    var h = '<div class="ak-sentry">';
    h += '<div class="ak-sentry-date">'+e.date+'</div>';
    h += '<div class="ak-sentry-lbl">'+e.label+'</div>';
    if(e.imgs&&e.imgs.length){
      h += '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px">';
      e.imgs.forEach(function(img){ h += '<img src="'+img+'" style="height:50px;border-radius:5px;object-fit:cover;cursor:pointer;border:1px solid #2a1f42" onclick="window.open(this.src)">'; });
      h += '</div>';
    }
    if(e.text) h += '<div class="ak-sentry-txt">'+e.text.substring(0,300)+(e.text.length>300?'…':'')+'</div>';
    h += '<div style="display:flex;gap:5px;margin-top:6px">';
    h += '<button onclick="window.akGenDSPSec('+i+')" class="ak-sbtn" style="font-size:8px">+ DSP Section</button>';
    h += '<button onclick="(function(){window.jessiImages=(window.sonyData['+i+'].imgs||[]).map(function(d,k){return{type:\'image/jpeg\',data:d,name:\'sony-\'+k+\'.jpg\'};});if(typeof go===\'function\')go(\'ai\');setTimeout(function(){var inp=document.getElementById(\'ai-inp\');if(inp)inp.value=\'Analyze this Sony data and generate highlighted data points as a dashboard section:\\n\\n\'+window.sonyData['+i+'].label+\'\\n\'+window.sonyData['+i+'].text;if(typeof aiSend===\'function\')setTimeout(aiSend,100);},300);})()" class="ak-sbtn" style="font-size:8px">✦ Jessi Section</button>';
    h += '<button onclick="window.akDelSony('+i+')" class="ak-sentry-del">×</button>';
    h += '</div></div>';
    return h;
  }).join('');
};

window.akGenDSPSec = function(i){
  var e = window.sonyData[i]; if(!e) return;
  var sec = { id:Date.now(), ts:Date.now(), title:e.label+' — '+e.date, text:e.text||(e.imgs.length?'['+e.imgs.length+' screenshot(s) — use ✦ Jessi to analyze]':''), date:new Date().toLocaleString() };
  window.dspSections.push(sec); saveDSP(); window.renderDSPSecs();
  window.crSections.push({ id:Date.now()+1, ts:Date.now(), title:'Sony: '+e.label, text:sec.text, date:new Date().toLocaleString() });
  saveCR();
  if(document.getElementById('ak-cr-secs')) window.renderCRSecs();
  if(typeof showGDriveToast==='function') showGDriveToast('DSP section created ✓');
};

window.akDelSony = function(i){
  window.sonyData.splice(i,1); saveSONY(); window.akRenderSonyHL();
};

window.akManualDSPSec = function(){
  var title = prompt('Section title:'); if(!title) return;
  var text = prompt('Paste data (or press OK to add empty section):') || '';
  window.dspSections.push({ id:Date.now(), ts:Date.now(), title:title, text:text, date:new Date().toLocaleString() });
  saveDSP(); window.renderDSPSecs();
};

// ═══════════════════════════════════════
// 7. PAGE INJECTION ON RENDER
// ═══════════════════════════════════════
function _injDSP(){
  var pg = document.querySelector('#main .pg, #main'); if(!pg) return;
  if(pg.querySelector('.ak-sony')) return; // already injected
  var sonyWrap = document.createElement('div');
  sonyWrap.innerHTML = buildSonyPanelHTML()+buildDSPSecsHTML();
  pg.insertAdjacentElement('afterbegin', sonyWrap);
  // Set today's date

  if(dateInp) dateInp.value = new Date().toISOString().split('T')[0];
  window.akRenderSonyHL();
  window.renderDSPSecs();
}

function _injCR(){
  if(document.querySelector('.ak-cr-injected')) return;
  _upgradeCRPanel();
  if(typeof window.switchCampaignReport==='function') window.switchCampaignReport('all');
}

// Hook into renderPage
if(typeof renderPage==='function'){
  var _rp0 = window.renderPage;
  window.renderPage = function(){
    _rp0.apply(this, arguments);
    setTimeout(function(){
      var cur = typeof CUR!=='undefined' ? CUR : '';
      if(cur==='dsp') _injDSP();
      if(cur==='campaignreport') _injCR();
    }, 220);
  };
}

document.addEventListener('DOMContentLoaded', function(){
  setTimeout(function(){
    var cur = typeof CUR!=='undefined' ? CUR : '';
    if(cur==='dsp') _injDSP();
    if(cur==='campaignreport') _injCR();
    // If campaign report is the default page, also trigger
    if(document.getElementById('camp-report-content')) _injCR();
  }, 800);
});

console.log('[AK PATCH] Drive buttons fixed · Sony panel · CR sections · 7-day persistence · drag+drop ready');
})();

<!-- ═══ AK INTELLIGENCE MASTER PATCH v3 ═══
  1. Drive bar: static at bottom
  2. Nav toggle: works every tab (clones element to reset listeners)
  3. Hash routing: /#/overview /#/crm /#/budget-tracker
  4. JSONBin sync: auto-save/load all data
  5. RapidAPI: live metrics, sound creates, creator search
  6. Creator Dashboard: cross-bin data pull
  7. Shareable link copy button
═══════════════════════════════════════════ -->
<style>
#wm-fixed-bar{display:none!important;pointer-events:none!important}
.main{padding-bottom:20px!important}
.pg>.drive-bar{display:flex!important}
.drive-bar:not(#wm-fixed-bar .drive-bar){display:flex!important}
.drive-bar{position:static!important;bottom:auto!important;background:var(--bg2)!important;border-top:1px solid var(--bdr)!important;border-radius:9px!important;margin-top:18px!important}
@media(max-width:600px){
  .hdr{padding:0 6px!important}
  .logo-nm{display:none!important}
  .htab{padding:3px 5px!important;font-size:8px!important}
  .hdr-r{display:none!important}
  .sidebar{width:0!important;overflow:hidden!important;position:fixed!important;height:100vh!important;top:0!important;left:0!important;z-index:200!important}
  .sidebar.mob-open{width:166px!important;overflow-y:auto!important}
  .sidebar.mob-open .sg{display:block!important}
  .sidebar.mob-open .si,.sidebar.mob-open .sb-bottom{display:flex!important}
}
.wm-link-btn{background:none;border:1px solid var(--bdr);border-radius:5px;color:var(--tx2);cursor:pointer;padding:3px 7px;font-size:10px;margin-left:6px;transition:all .14s}
.wm-link-btn:hover{border-color:var(--purple);color:var(--purple)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal{background:#08081a;border:1px solid var(--bdr);border-radius:12px;padding:22px;max-width:600px;width:92%;max-height:88vh;overflow-y:auto}
</style>
<script>
(function(){
'use strict';

// ── HASH ROUTING
var ROUTE_MAP={
  'overview':'overview','platforms':'platforms','dsp':'dsp',
  'catalogue':'catalogue','chartex':'chartex',
  'campaign-report':'campaignreport','campaignreport':'campaignreport',
  'viral':'viral','listening':'listening','jessi':'ai','ai':'ai',
  'campaigns':'campaigns','crm':'crm','creators':'crm',
  'budget':'budget','budget-tracker':'budget',
  'calendar':'calendar','drafts':'drafts',
  'contracts':'contracts','partners':'partners'
};
function _getRoute(){var h=location.hash.replace('#/','').replace('#','').toLowerCase().trim();return ROUTE_MAP[h]||null;}
function _setRoute(id){var h='#/'+id;if(location.hash!==h)history.replaceState(null,'',h);}
function _patchGo(){
  if(typeof window.go==='function'&&!window.go._akv3){
    var _o=window.go;
    window.go=function(id){_o(id);_setRoute(id);setTimeout(_bindNav,90);};
    window.go._akv3=true;
  }
}
window.addEventListener('load',function(){
  _patchGo();
  var r=_getRoute();
  if(r){if(typeof window.go==='function')window.go(r);else setTimeout(function(){_patchGo();if(typeof window.go==='function')window.go(r);},400);}
  setTimeout(_bindNav,600);
  _addLinkBtn();
  // Load creator data on startup
  if(typeof window.loadCreatorData==='function') window.loadCreatorData();
});
window.addEventListener('hashchange',function(){var r=_getRoute();if(r&&typeof window.go==='function')window.go(r);});

// ── NAV TOGGLE — clone element to reset all listeners on every tab change
window.toggleSidebar=function(){
  var sb=document.getElementById('sidebar');
  var btn=document.getElementById('sb-toggle');
  var tog=document.getElementById('hdr-nav-toggle');
  if(!sb)return;
  if(window.innerWidth<=600){
    sb.classList.remove('collapsed');
    var open=sb.classList.contains('mob-open');
    if(open){
      sb.classList.remove('mob-open');
      if(btn)btn.textContent='☰';if(tog)tog.innerHTML='&#9776;';
    }else{
      sb.classList.add('mob-open');
      if(btn)btn.textContent='✕';if(tog)tog.innerHTML='✕';
      function oc(e){
        var t=e.target||e.srcElement;
        if(!sb.contains(t)&&t!==btn&&t!==tog){
          sb.classList.remove('mob-open');
          if(btn)btn.textContent='☰';if(tog)tog.innerHTML='&#9776;';
          document.removeEventListener('touchstart',oc);document.removeEventListener('click',oc);
        }
      }
      setTimeout(function(){document.addEventListener('touchstart',oc,{passive:true});document.addEventListener('click',oc,{passive:true});},150);
    }
  }else{
    var col=sb.classList.toggle('collapsed');
    if(tog)tog.innerHTML=col?'&#9658;':'&#9776;';
    if(btn)btn.textContent=col?'▶':'◀';
    localStorage.setItem('wm_sb_col',col?'1':'0');
  }
};

function _bindNav(){
  // Clone to reset ALL existing listeners — fixes "only works once" bug
  ['sb-toggle','hdr-nav-toggle'].forEach(function(id){
    var el=document.getElementById(id);if(!el||!el.parentNode)return;
    var clone=el.cloneNode(true);
    el.parentNode.replaceChild(clone,el);
    clone.addEventListener('touchend',function(e){e.preventDefault();e.stopPropagation();window.toggleSidebar();},{passive:false});
    clone.addEventListener('click',function(e){e.stopPropagation();window.toggleSidebar();});
  });
  if(window.innerWidth<=600){var sb=document.getElementById('sidebar');if(sb)sb.classList.remove('collapsed');}
}

function _hookRender(){
  if(typeof renderPage==='function'&&!window.renderPage._v3){
    var _rp=window.renderPage;
    window.renderPage=function(){
      _rp.apply(this,arguments);
      if(typeof CUR!=='undefined')_setRoute(CUR);
      setTimeout(_bindNav,120);
    };
    window.renderPage._v3=true;
  }
}
_hookRender();
document.addEventListener('DOMContentLoaded',function(){_hookRender();_patchGo();setTimeout(_bindNav,700);});

// ── SHAREABLE LINK BUTTON
function _addLinkBtn(){
  var hdr=document.querySelector('.hdr-r');
  if(!hdr||hdr.querySelector('.wm-link-btn'))return;
  var btn=document.createElement('button');
  btn.className='wm-link-btn';btn.innerHTML='🔗';btn.title='Copy shareable link to this tab';
  btn.onclick=function(){
    var url=location.origin+location.pathname+location.hash;
    navigator.clipboard&&navigator.clipboard.writeText(url).catch(function(){});
    if(typeof showGDriveToast==='function')showGDriveToast('🔗 Link copied: '+url);
    btn.innerHTML='✓';setTimeout(function(){btn.innerHTML='🔗';},1800);
  };
  hdr.appendChild(btn);
}

// ── JSONBIN SYNC
var _jbs=false,_jbq=null;
window.jbSave=async function(data){
  if(_jbs){_jbq=data;return;}_jbs=true;
  try{await fetch('/jb/ak',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}
  catch(e){console.warn('[JB]',e.message);}
  _jbs=false;if(_jbq){var q=_jbq;_jbq=null;window.jbSave(q);}
};
window.jbLoad=async function(){
  try{var r=await fetch('/jb/ak');if(!r.ok)return null;return await r.json();}catch(e){return null;}
};
window.jbLoadCreator=async function(){
  try{var r=await fetch('/jb/creator');if(!r.ok)return null;return await r.json();}catch(e){return null;}
};

// Auto-save every 30s
setInterval(function(){
  var d={};
  if(typeof CAMPAIGNS_DATA!=='undefined')d.campaigns=CAMPAIGNS_DATA;
  if(typeof crmData!=='undefined')d.crm=crmData;
  if(typeof budgetData!=='undefined')d.budget=budgetData;
  if(typeof aiHist!=='undefined')d.aiHist=aiHist.slice(-50);
  if(typeof viralDB!=='undefined')d.viralDB=viralDB;
  if(typeof window.sonyData!=='undefined')d.sonyData=window.sonyData;
  if(typeof contractsData!=='undefined')d.contracts=contractsData;
  if(typeof DRAFTS_DATA!=='undefined')d.drafts=DRAFTS_DATA;
  if(typeof window._dataSections!=='undefined')d.dataSections=window._dataSections;
  if(Object.keys(d).length)window.jbSave(d);
},30000);

// Restore on load
window.addEventListener('load',async function(){
  var saved=await window.jbLoad();
  if(!saved)return;
  try{
    if(saved.campaigns&&typeof CAMPAIGNS_DATA!=='undefined')CAMPAIGNS_DATA.splice(0,CAMPAIGNS_DATA.length,...saved.campaigns);
    if(saved.crm&&typeof crmData!=='undefined')crmData.splice(0,crmData.length,...saved.crm);
    if(saved.viralDB&&typeof viralDB!=='undefined')viralDB.splice(0,viralDB.length,...saved.viralDB);
    if(saved.sonyData&&window.sonyData)window.sonyData.splice(0,window.sonyData.length,...saved.sonyData);
    if(saved.contracts&&typeof contractsData!=='undefined')contractsData.splice(0,contractsData.length,...saved.contracts);
    if(saved.drafts&&typeof DRAFTS_DATA!=='undefined')DRAFTS_DATA.splice(0,DRAFTS_DATA.length,...saved.drafts);
    if(saved.dataSections&&window._dataSections){Object.assign(window._dataSections,saved.dataSections);localStorage.setItem('wm_data_sections',JSON.stringify(window._dataSections));}
    if(saved.aiHist&&typeof aiHist!=='undefined'&&!aiHist.length)saved.aiHist.forEach(function(m){aiHist.push(m);});
    console.log('[JB] Restored data from JSONBin');
  }catch(e){console.warn('[JB] restore:',e.message);}
});

// ── LIVE POST METRICS (RapidAPI via server)
window.fetchPostMetrics=async function(postUrl){
  if(!postUrl)return null;
  try{
    var isTT=postUrl.includes('tiktok.com');
    var isIG=postUrl.includes('instagram.com');
    if(isTT){
      var vid=postUrl.match(/video\/(\d{10,25})/)?.[1];if(!vid)return null;
      var r=await fetch('/api/tt-post?videoId='+vid+'&videoUrl='+encodeURIComponent(postUrl));
      var d=await r.json();
      var v=d?.itemInfo?.itemStruct||d?.data||d;
      var st=v?.stats||v?.statistics||{};
      return{platform:'tiktok',views:st.playCount||st.play_count||0,likes:st.diggCount||st.digg_count||0,
        comments:st.commentCount||st.comment_count||0,shares:st.shareCount||st.share_count||0,
        thumb:v?.video?.cover||null,author:v?.author?.uniqueId||null};
    }
    if(isIG){
      var r2=await fetch('/api/ig-post?postUrl='+encodeURIComponent(postUrl));
      var d2=await r2.json();
      var items=d2?.data?.items||d2?.items||[];var item=items[0]||d2?.data||d2;
      if(!item)return null;
      return{platform:'instagram',views:item.view_count||0,likes:item.like_count||0,
        comments:item.comment_count||0,saves:item.saved_count||0,
        thumb:item.image_versions2?.candidates?.[0]?.url||null,author:item.user?.username||null};
    }
  }catch(e){console.warn('[METRICS]',e.message);}
  return null;
};

// ── SOUND CREATES
window.fetchSoundCreates=async function(ttMid,igAid){
  var res={};
  if(ttMid){try{var r=await fetch('/api/tt-music?musicId='+ttMid);var d=await r.json();var m=d?.data?.music_info||d?.music_info||d?.data||d;res.tt={videoCount:m?.video_count||m?.videoCount||null,title:m?.title||null};}catch(e){}}
  if(igAid){try{var r2=await fetch('/api/ig-music?audioId='+igAid);var d2=await r2.json();res.ig={mediaCount:d2?.media_count||null,title:d2?.title||null};}catch(e){}}
  return res;
};

// ── CREATOR SEARCH (Scraptik)
window.searchCreators=async function(keyword){
  try{var r=await fetch('/api/scraptik-search-users?keyword='+encodeURIComponent(keyword));return await r.json();}
  catch(e){console.warn('[SEARCH]',e.message);return null;}
};

console.log('[AK v3] All systems loaded: hash routing + nav fix + JSONBin + RapidAPI + Creator Dashboard');
})();
</script>
